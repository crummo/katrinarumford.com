<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404</title>
  <link rel="icon" id="nf-favicon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f0ece6;
      --fg:         #1a1714;
      --fg-mid:     #5a5248;
      --fg-dim:     #8a8078;
      --fg-dimmer:  #ccc7be;
      --accent:     #c9a96e;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans:  'DM Sans', sans-serif;
      --ease:       cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    [data-theme="dark"] {
      --bg:        #131110;
      --fg:        #ede8e0;
      --fg-mid:    #a89e90;
      --fg-dim:    #5a5248;
      --fg-dimmer: #2a2623;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-sans);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    /* film grain */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 9999;
      pointer-events: none; opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
      text-align: center;
    }

    .num {
      font-family: var(--font-serif);
      font-size: clamp(96px, 18vw, 180px);
      font-weight: 400;
      font-style: italic;
      color: var(--fg-dimmer);
      line-height: 1;
      letter-spacing: -0.02em;
      animation: fadeUp 0.6s var(--ease) both;
    }

    .rule {
      width: 40px; height: 1px;
      background: var(--fg-dimmer);
      margin: 32px auto;
      animation: fadeUp 0.6s 0.1s var(--ease) both;
    }

    .heading {
      font-family: var(--font-serif);
      font-size: clamp(18px, 3vw, 24px);
      font-style: italic;
      font-weight: 400;
      color: var(--fg);
      margin-bottom: 16px;
      animation: fadeUp 0.6s 0.15s var(--ease) both;
    }

    .sub {
      font-size: 13px;
      color: var(--fg-mid);
      line-height: 1.7;
      max-width: 340px;
      margin: 0 auto 40px;
      animation: fadeUp 0.6s 0.2s var(--ease) both;
    }

    .back {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--fg-dim);
      text-decoration: none;
      border-bottom: 1px solid var(--fg-dimmer);
      padding-bottom: 3px;
      transition: color 0.25s var(--ease), border-color 0.25s var(--ease);
      animation: fadeUp 0.6s 0.25s var(--ease) both;
    }
    .back:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="num">404</div>
  <div class="rule"></div>
  <p class="heading" id="nf-heading">Pulled for another shoot.</p>
  <p class="sub" id="nf-sub">The page you're after isn't on this rack.</p>
  <a class="back" href="/" id="nf-back">Back to home</a>

  <script>
    const isPreview = new URLSearchParams(location.search).get('preview') === '1';

    function applyData(data) {
      if (!data) return;
      const n = data.notFound;
      if (n && n.heading) document.getElementById('nf-heading').textContent = n.heading;
      if (n && n.sub)     document.getElementById('nf-sub').textContent     = n.sub;
      if (n && n.back)    document.getElementById('nf-back').textContent    = n.back;
      if (data.ownerName) document.title = '404 — ' + data.ownerName;
      if (data.favicon)   document.getElementById('nf-favicon').href = data.favicon;
      if (data.accentColor) document.documentElement.style.setProperty('--accent', data.accentColor);
      const mode = data.themeMode || 'light';
      const resolved = mode === 'dark' ? 'dark'
        : mode === 'light' ? 'light'
        : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', resolved);
      if (isPreview) {
        const banner = document.createElement('div');
        banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:var(--accent);color:#1a1714;text-align:center;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;padding:5px 12px;font-weight:600;z-index:999';
        banner.textContent = 'Preview mode — changes not saved to live site';
        document.body.prepend(banner);
      }
    }

    if (isPreview) {
      try {
        const data = JSON.parse(sessionStorage.getItem('cr_preview') || '');
        applyData(data.siteConfig || data);
      } catch(e) {
        applyData(null);
      }
    } else {
      fetch('site.json')
        .then(r => r.ok ? r.json() : null)
        .then(applyData)
        .catch(() => {});
    }
  </script>

</body>
</html>
