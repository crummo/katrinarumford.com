<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Katrina Rumford — Styling / Custom Made</title>
  <meta name="description"        content="Katrina Rumford is a wardrobe stylist based in Los Angeles, California." />
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="Katrina Rumford" />
  <meta property="og:description" content="Katrina Rumford is a wardrobe stylist based in Los Angeles, California." />
  <meta property="og:image"       content="" />
  <meta property="og:url"         content="https://www.katrinarumford.com" />
  <meta name="twitter:card"       content="summary_large_image" />
  <meta name="twitter:image"      content="" />
  <link rel="canonical"           href="" id="site-canonical" />
  <link rel="icon" id="site-favicon" href="data:image/svg+xml,%3Csvg viewBox='0 0 32 32' xmlns='http://www.w3.org/2000/svg' fill='none' stroke='%23c9a96e' stroke-width='1.5' stroke-linejoin='round'%3E%3Cpolygon points='16,2 28,9 16,16 4,9'/%3E%3Cpolygon points='28,9 28,23 16,30 16,16'/%3E%3Cpolygon points='4,9 16,16 16,30 4,23'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />

  <script>
    /* Runs before paint to prevent theme flash */
    (function() {
      function _applyTheme(mode) {
        var resolved = mode === 'light' ? 'light'
          : mode === 'dark' ? 'dark'
          : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', resolved);
      }
      try {
        var _pk2 = new URLSearchParams(location.search).get('pk');
        var _raw2 = (_pk2 && localStorage.getItem('cr_preview_' + _pk2)) || localStorage.getItem('cr_preview') || sessionStorage.getItem('cr_preview') || '{}';
        var s = JSON.parse(_raw2);
        var cfg = s.siteConfig || s;
        var cached = localStorage.getItem('kr_theme');
        _applyTheme(cfg.themeMode || cached || 'light');
      } catch(e) { _applyTheme(localStorage.getItem('kr_theme') || 'light'); }
    })();
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f0ece6;
      --bg2:        #e8e3dc;
      --bg3:        #ddd8d0;
      --fg:         #1a1714;
      --fg-mid:     #5a5248;
      --fg-dim:     #8a8078;
      --fg-dimmer:  #ccc7be;
      --accent:     #c9a96e;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans:  'DM Sans', sans-serif;
      --nav-h:      60px;
      --nav-w:      270px;
      --ease:       cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    [data-theme="dark"] {
      --bg:        #131110;
      --bg2:       #1c1917;
      --bg3:       #231f1c;
      --fg:        #ede8e0;
      --fg-mid:    #a89e90;
      --fg-dim:    #5a5248;
      --fg-dimmer: #2a2623;
    }

    [data-theme="light"] {
      --bg:        #f0ece6;
      --bg2:       #e8e3dc;
      --bg3:       #ddd8d0;
      --fg:        #1a1714;
      --fg-mid:    #5a5248;
      --fg-dim:    #8a8078;
      --fg-dimmer: #ccc7be;
    }

    /* ── VIEWER BACKGROUND ── */
    :root {
      --lb-bg: rgba(9,7,6,0.97);
      --lb-fg: #ede8e0; --lb-fg-dim: #8a7f76; --lb-fg-dimmer: #2a2623; --lb-fg-mid: #b0a89e;
    }
    html[data-viewer-bg="light"],
    html[data-viewer-bg="auto"][data-theme="light"] {
      --lb-bg: rgba(240,236,230,0.97);
      --lb-fg: #1a1714; --lb-fg-dim: #8a8078; --lb-fg-dimmer: #ccc7be; --lb-fg-mid: #5a5248;
      --gv-bg: #f0ece6; --gv-fg: #1a1714; --gv-fg-dim: #8a8078; --gv-fg-dimmer: #ccc7be; --gv-bg2: #e8e3dc;
    }
    html[data-viewer-bg="dark"] {
      --gv-bg: #131110; --gv-fg: #ede8e0; --gv-fg-dim: #5a5248; --gv-fg-dimmer: #2a2623; --gv-bg2: #1c1917;
    }

    html { background: var(--bg); color: var(--fg); font-family: var(--font-sans); font-weight: 300; -webkit-font-smoothing: antialiased; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; overscroll-behavior-y: none; }
    body { min-height: 100vh; background: var(--bg); overscroll-behavior-y: none; }

    /* film grain */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 9999;
      pointer-events: none; opacity: var(--film-grain-opacity, 0.028);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    /* Disable double-tap-to-zoom on tappable image elements. iOS Safari
       respects user-scalable=no inconsistently for double-tap; this is
       the reliable opt-out. Single tap, scroll, and (allowed) pinch all
       still work. */
    .gv-img, .gv-media, .mobile-item, .grid-item, .lb-image-wrap {
      touch-action: manipulation;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      /* env(safe-area-inset-top) = status-bar height with viewport-fit=cover; 0 elsewhere */
      height: calc(var(--nav-h) + env(safe-area-inset-top, 0px));
      display: flex; align-items: center; justify-content: space-between;
      padding: env(safe-area-inset-top, 0px) 44px 0;
      background: var(--bg);
      border-bottom: 1px solid var(--fg-dimmer);
      /* iOS Safari: force own compositing layer so scrolled page content
         doesn't end up rendered above the nav during scroll. */
      transform: translateZ(0);
      -webkit-transform: translate3d(0, 0, 0);
      will-change: transform;
    }

    .nav-brand { display: flex; align-items: baseline; gap: 14px; cursor: pointer; text-decoration: none; flex-shrink: 0; }
    .nav-brand-name { font-family: var(--font-serif); font-size: 19px; font-weight: 500; letter-spacing: 0.02em; color: var(--fg); line-height: 1; }
    .nav-brand-rule { width: 1px; height: 13px; background: var(--fg-dim); }
    .nav-brand-title { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #a89e90; font-weight: 300; }

    .nav-links { display: flex; gap: 32px; list-style: none; align-items: center; }
    .nav-links a {
      text-decoration: none; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--fg-dim); transition: color 0.25s var(--ease); font-weight: 400;
      cursor: pointer; position: relative; padding-bottom: 3px; white-space: nowrap;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -2px; left: 0; right: 0;
      height: 1px; background: var(--accent);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.3s var(--ease);
    }
    .nav-links a:hover { color: var(--fg-mid); }
    .nav-links a:hover::after { transform: scaleX(0.5); }
    .nav-links a.active { color: var(--fg); }
    .nav-links a.active::after { transform: scaleX(1); }

    .nav-right { display: flex; align-items: center; gap: 6px; }

    .theme-toggle { background: none; border: none; cursor: pointer; color: var(--fg-dim); font-size: 14px; padding: 4px 6px; transition: color 0.2s; line-height: 1; }
    .theme-toggle:hover { color: var(--fg); }
    .theme-toggle.hidden { display: none; }

    .nav-hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; }
    .nav-hamburger span { display: block; width: 22px; height: 1px; background: var(--fg-mid); transition: all 0.25s var(--ease); }

    .nav-drawer {
      position: fixed; top: calc(var(--nav-h) + env(safe-area-inset-top, 0px)); left: 0; right: 0;
      background: var(--bg);
      padding: 0 24px; z-index: 190;
      max-height: 0; overflow: hidden;
      transition: max-height 0.35s var(--ease), padding 0.35s var(--ease);
    }
    .nav-drawer.open { max-height: 500px; padding: 16px 24px 20px; border-bottom: 1px solid var(--fg-dimmer); }
    .nav-drawer a {
      display: block; text-decoration: none; font-size: 12px; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--fg-dim); padding: 14px 0 14px 10px;
      border-bottom: 1px solid var(--fg-dimmer); border-left: 2px solid transparent; cursor: pointer;
      transition: color 0.25s var(--ease), border-color 0.25s var(--ease); font-weight: 400;
    }
    .nav-drawer a:last-child { border-bottom: none; }
    .nav-drawer a:hover { color: var(--fg); }
    .nav-drawer a.active { color: var(--accent); border-left-color: var(--accent); }
    /* Drawer contact item — two lines (label + email) so visitors can long-press
       the email to copy it. */
    .nav-drawer .nav-drawer-contact { display: flex; flex-direction: column; gap: 3px; padding-top: 14px; padding-bottom: 14px; }
    .nav-drawer .nav-drawer-contact .nav-drawer-contact-email { font-size: 13px; letter-spacing: 0; text-transform: none; color: var(--accent); font-weight: 400; }
    /* Drawer email line that follows a regular Contact link — small, indented,
       lowercase. Reads as a sub-item beneath CONTACT. */
    .nav-drawer a.nav-drawer-contact-email-line {
      font-size: 12px; letter-spacing: 0; text-transform: none;
      color: var(--accent); padding-top: 4px; padding-bottom: 14px;
      border-bottom: 1px solid var(--fg-dimmer); border-left-width: 0;
      margin-top: -10px;
    }

    /* ── LEFT NAV ── */
    body.nav-left nav {
      top: 0; left: 0; bottom: 0; right: auto;
      width: var(--nav-w); height: 100vh;
      flex-direction: column; align-items: flex-start; justify-content: flex-start;
      padding: 44px 28px 32px;
      border-bottom: none; border-right: none;
    }
    body.nav-left .nav-brand { flex-direction: column; align-items: flex-start; gap: 8px; margin-bottom: 40px; }
    body.nav-left .nav-brand-name { font-size: 24px; }
    body.nav-left .nav-brand-rule { width: 24px; height: 1px; }
    body.nav-left .nav-right { flex-direction: column; align-items: flex-start; flex: 1; width: 100%; }
    body.nav-left .nav-links { flex-direction: column; align-items: flex-start; gap: 14px; }
    body.nav-left .nav-links a { font-weight: 500; letter-spacing: 0.15em; white-space: nowrap; padding-left: 10px; border-left: 2px solid transparent; transition: color 0.25s var(--ease), border-color 0.25s var(--ease); }
    body.nav-left .nav-links a::after { display: none; }
    body.nav-left .nav-links a.active { color: var(--accent); border-left-color: var(--accent); }
    body.nav-left .nav-brand-title { font-weight: 500; letter-spacing: 0.25em; }
    body.nav-left .nav-hamburger { display: none !important; }
    body.nav-left .nav-drawer { display: none !important; }
    body.nav-left .theme-toggle { margin-top: auto; }
    body.nav-left main { padding-top: 0; padding-left: var(--nav-w); }
    body.is-preview.nav-left nav { top: 28px; height: calc(100vh - 28px); }

    /* ── MAIN ── */
    main { padding-top: calc(var(--nav-h) + env(safe-area-inset-top, 0px)); }
    .page { display: none; }
    .page.visible { display: block; animation: pageIn 0.35s var(--ease) both; }
    .page.leaving  { display: block; animation: pageOut 0.2s var(--ease) both; pointer-events: none; }
    @keyframes pageIn  { from { opacity: 0; transform: translateY(8px); }  to { opacity: 1; transform: translateY(0); } }
    @keyframes pageOut { from { opacity: 1; transform: translateY(0); }     to { opacity: 0; transform: translateY(-6px); } }
    @keyframes gvIn    { from { opacity: 0; }                               to { opacity: 1; } }

    /* ── GRID — DESKTOP ── */
    /* masonry: JS positions items absolutely; layout-grid uses CSS grid */
    .gallery-grid { position: relative; padding: 3px; }
    .gallery-grid.layout-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
    .gallery-grid.layout-grid .grid-item { aspect-ratio: 16/9; }
    .gallery-grid.layout-grid .grid-thumb { height: 100%; object-fit: cover; }

    .grid-item {
      position: absolute; overflow: hidden; cursor: pointer;
      background: var(--bg2); animation: gridIn 0.45s var(--ease) both;
    }
    .gallery-grid.layout-grid .grid-item { position: relative; }
    .grid-item:nth-child(1)   { animation-delay: 0.02s; }
    .grid-item:nth-child(2)   { animation-delay: 0.07s; }
    .grid-item:nth-child(3)   { animation-delay: 0.12s; }
    .grid-item:nth-child(4)   { animation-delay: 0.17s; }
    .grid-item:nth-child(5)   { animation-delay: 0.22s; }
    .grid-item:nth-child(6)   { animation-delay: 0.27s; }
    .grid-item:nth-child(n+7) { animation-delay: 0.32s; }
    @keyframes gridIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }

    .grid-thumb { width: 100%; height: auto; display: block; transition: transform 0.65s var(--ease), filter 0.65s var(--ease); filter: var(--thumb-filter, none); }
    .grid-item:hover .grid-thumb { transform: scale(1.04); filter: saturate(0.55) brightness(0.28); }
    /* Hover-to-play video overlay — only attached when project has hoverPreview.
       Sits on top of the image thumbnail at the same dimensions; fades in once
       playback is ready. Hidden on touch devices via :hover not matching. */
    .grid-thumb-video {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
      opacity: 0; transition: opacity 0.4s var(--ease); pointer-events: none; z-index: 2;
    }
    .grid-item:hover .grid-thumb-video.ready { opacity: 1; }

    .grid-scrim { position: absolute; inset: 0; pointer-events: none; opacity: 1; transition: opacity 0.4s var(--ease); }
    .grid-item:hover .grid-scrim { opacity: 0; }

    .grid-placeholder { width: 100%; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; background: var(--bg2); transition: background 0.5s var(--ease); }
    .grid-item:hover .grid-placeholder { background: #1e1b17; }

    .grid-placeholder-icon { width: 28px; height: 20px; border: 1.5px solid var(--fg-dim); border-radius: 2px; position: relative; opacity: 0; transition: opacity 0.4s var(--ease); }
    .grid-item:hover .grid-placeholder-icon { opacity: 0.45; }
    .grid-placeholder-icon::after { content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-38%,-50%); border-left: 7px solid var(--fg-dim); border-top: 4px solid transparent; border-bottom: 4px solid transparent; }

    .grid-play { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 36px; height: 25px; border: 1.5px solid rgba(237,232,224,0.35); border-radius: 2px; opacity: 0; transition: opacity 0.4s var(--ease); pointer-events: none; }
    .grid-play::after { content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-38%,-50%); border-left: 7px solid rgba(237,232,224,0.35); border-top: 4px solid transparent; border-bottom: 4px solid transparent; }
    .grid-item:hover .grid-play { opacity: 1; }

    .grid-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 12px 18px; gap: 4px; pointer-events: none; }
    /* grid text always light — it sits on dark thumbnails regardless of site theme */
    .grid-client { font-size: 8px; letter-spacing: 0.22em; text-transform: uppercase; color: #c9a96e; font-weight: 500; line-height: 1; transition: font-size 0.4s var(--ease), letter-spacing 0.4s var(--ease), opacity 0.4s var(--ease), transform 0.4s var(--ease); }
    .grid-title { font-family: var(--font-serif); font-size: 9px; font-style: italic; font-weight: 500; color: #ede8e0; line-height: 1.35; transition: font-size 0.4s var(--ease), opacity 0.4s var(--ease), transform 0.4s var(--ease); }
    .grid-award { position: absolute; bottom: 10px; left: 0; right: 0; text-align: center; font-size: 7px; letter-spacing: 0.14em; text-transform: uppercase; color: #c9a96e; font-weight: 400; opacity: 0; pointer-events: none; transition: opacity 0.3s 0.1s var(--ease); }

    .grid-item:hover .grid-center { gap: 0; }
    .grid-item:hover .grid-client { font-size: 10px; letter-spacing: 0.26em; opacity: 1 !important; transform: translateY(-22px); }
    .grid-item:hover .grid-title  { font-size: 14px; opacity: 1 !important; transform: translateY(34px); }
    .grid-item:hover .grid-award  { opacity: 1; }

    /* solo — title only, no client */
    .grid-center.solo .grid-title { font-size: 10px; opacity: 0.55; }
    .grid-item:hover .grid-center.solo .grid-title { font-size: 15px; opacity: 1; transform: none; }

    /* editorial — slightly favors title at rest; client more subdued on hover */
    .grid-center.overlay-editorial .grid-title { font-size: 11px; }
    .grid-center.overlay-editorial .grid-client { font-size: 7px; opacity: 0.75; }
    .grid-item:hover .grid-center.overlay-editorial .grid-client { font-size: 8px; letter-spacing: 0.18em; opacity: 0.55; transform: translateY(-22px); }
    .grid-item:hover .grid-center.overlay-editorial .grid-title  { font-size: 17px; opacity: 1; transform: translateY(36px); }

    /* centered — title only, single line, no play/client/award */
    .grid-center.overlay-centered .grid-client,
    .grid-center.overlay-centered .grid-play,
    .grid-center.overlay-centered .grid-award { display: none !important; }
    .grid-center.overlay-centered .grid-title {
      font-size: 11px; opacity: 0.6;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 90%; transform: none;
    }
    .grid-item:hover .grid-center.overlay-centered .grid-title {
      font-size: 17px; opacity: 1 !important; transform: none !important;
    }

    /* reveal — hide the whole overlay container at rest, fade in on hover */
    /* Children stay at full opacity so parent fade-in is the only transition; default hover transforms still apply */
    .grid-center.overlay-reveal { opacity: 0 !important; transition: opacity 0.4s var(--ease); }
    .grid-center.overlay-reveal .grid-client { opacity: 1 !important; }
    .grid-center.overlay-reveal .grid-title  { opacity: 1 !important; }
    .grid-center.overlay-reveal .grid-play   { opacity: 1 !important; }
    .grid-center.overlay-reveal .grid-award  { opacity: 1 !important; }
    .grid-item:hover .grid-center.overlay-reveal { opacity: 1 !important; }
    .grid-item .grid-center.overlay-none,
    .grid-item:hover .grid-center.overlay-none { display: none; }
    .grid-item.overlay-none:hover .grid-thumb { filter: saturate(1) brightness(1) !important; }

    /* ── MOBILE LIST ── */
    .mobile-list { display: none; }
    .mobile-item { display: flex; flex-direction: column; border-bottom: 1px solid var(--bg); cursor: pointer; transition: background 0.3s var(--ease); animation: gridIn 0.5s var(--ease) both; position: relative; }
    .mobile-item:nth-child(2) { animation-delay: 0.06s; }
    .mobile-item:nth-child(3) { animation-delay: 0.12s; }
    .mobile-item:nth-child(4) { animation-delay: 0.18s; }
    .mobile-item:nth-child(n+5) { animation-delay: 0.24s; }
    .mobile-item:active { background: var(--bg2); }
    .mobile-thumb-wrap { width: 100%; flex-shrink: 0; aspect-ratio: 16/9; overflow: hidden; background: var(--bg2); display: flex; align-items: center; justify-content: center; position: relative; }
    .mobile-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; filter: saturate(0.85) brightness(0.9); transition: transform 0.5s var(--ease); }
    .mobile-item:active .mobile-thumb-wrap img { transform: scale(1.02); }
    /* Native-aspect-ratio mode: each thumbnail keeps its source dimensions
       instead of being cropped to a uniform 16:9. Toggled via admin
       (siteConfig.mobileThumbsNative → body.thumbs-native). */
    body.thumbs-native .mobile-thumb-wrap { aspect-ratio: auto; display: block; }
    body.thumbs-native .mobile-thumb-wrap img { height: auto; object-fit: contain; }
    .mobile-placeholder-icon { width: 28px; height: 20px; border: 1.5px solid var(--fg-dim); border-radius: 2px; position: relative; opacity: 0.15; }
    .mobile-placeholder-icon::after { content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-38%,-50%); border-left: 7px solid var(--fg-dim); border-top: 4px solid transparent; border-bottom: 4px solid transparent; }
    .mobile-meta { padding: 14px 18px 18px; display: flex; flex-direction: column; justify-content: center; gap: 4px; }
    .mobile-client { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); font-weight: 400; }
    .mobile-title { font-family: var(--font-serif); font-size: 17px; font-style: italic; font-weight: 400; color: var(--fg); line-height: 1.35; }
    .mobile-award { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); opacity: 0.8; margin-top: 3px; }

    /* ── LIGHTBOX ── */
    .lightbox { display: none; position: fixed; inset: 0; z-index: 500; background: var(--lb-bg); flex-direction: column; align-items: center; justify-content: center; }
    .lightbox.open { display: flex; animation: lbIn 0.28s var(--ease); }
    @keyframes lbIn { from { opacity: 0; } to { opacity: 1; } }
    .lb-inner { width: 100%; max-width: 1020px; padding: 0 24px; display: flex; flex-direction: column; align-items: center; }
    .lb-image-wrap { width: 100%; aspect-ratio: 16/9; background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .lb-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .lb-ph { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
    .lb-ph-icon { width: 52px; height: 36px; border: 2px solid var(--lb-fg-dim); border-radius: 3px; position: relative; opacity: 0.15; }
    .lb-ph-icon::after { content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-38%,-50%); border-left: 14px solid var(--lb-fg-dim); border-top: 9px solid transparent; border-bottom: 9px solid transparent; }
    .lb-meta { width: 100%; margin-top: 20px; display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; }
    .lb-client { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
    .lb-title { font-family: var(--font-serif); font-size: 21px; font-weight: 400; font-style: italic; color: var(--lb-fg); line-height: 1.3; }
    .lb-award { margin-top: 7px; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); display: none; }
    .lb-desc { margin-top: 12px; font-size: 12px; line-height: 1.7; color: var(--lb-fg-mid); max-width: 480px; display: none; white-space: pre-wrap; max-height: calc(1.7em * 5); overflow: hidden; -webkit-mask-image: linear-gradient(to bottom, black 55%, transparent 100%); mask-image: linear-gradient(to bottom, black 55%, transparent 100%); }
    .lb-controls { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
    .lb-btn { background: none; border: 1px solid var(--lb-fg-dimmer); color: var(--lb-fg-mid); cursor: pointer; font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; padding: 8px 16px; transition: border-color 0.2s, color 0.2s; }
    .lb-btn:hover { border-color: var(--lb-fg-dim); color: var(--lb-fg); }
    .lb-btn:disabled { opacity: 0.18; cursor: default; }
    .lb-counter { font-size: 11px; color: var(--lb-fg-dim); letter-spacing: 0.08em; min-width: 48px; text-align: center; }
    .lb-close { position: fixed; top: 22px; right: 30px; background: none; border: none; cursor: pointer; color: var(--lb-fg-dim); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; font-family: var(--font-sans); transition: color 0.2s; }
    .lb-close:hover { color: var(--lb-fg); }
    .lb-float-prev, .lb-float-next { display: none; position: absolute; top: 0; bottom: 0; width: 52px; background: none; border: none; cursor: pointer; color: var(--fg-mid); opacity: 0.5; z-index: 10; align-items: center; justify-content: center; transition: opacity 0.2s; }
    .lb-float-prev { left: 0; }
    .lb-float-next { right: 0; }
    .lb-float-prev:hover, .lb-float-next:hover { opacity: 1; }
    .lb-float-prev:disabled, .lb-float-next:disabled { opacity: 0; pointer-events: none; }

    /* ── GALLERY VIEWER ── */
    .gv { display: none; position: fixed; z-index: 100; background: var(--gv-bg, var(--bg)); align-items: center; justify-content: center; overflow: hidden; flex-direction: column; }
    body.nav-left .gv { top: 0; left: var(--nav-w); right: 0; bottom: 0; }
    body:not(.nav-left) .gv { top: var(--nav-h); left: 0; right: 0; bottom: 0; }
    body.is-preview.nav-left .gv { top: 28px; }
    .gv.open { display: flex; animation: gvIn 0.3s var(--ease); }

    .gv-media { position: relative; width: 100%; flex: 1 1 0; min-height: 0; display: flex; align-items: center; justify-content: center; padding: 36px 48px 20px; box-sizing: border-box; }
    .gv-img { width: 100%; height: 100%; object-fit: contain; display: block; user-select: none; -webkit-user-drag: none; }
    .gv-iframe { width: 100%; height: 56.25vw; max-height: 100%; border: none; }

    .gv-arrow { position: absolute; top: 0; bottom: 0; width: 56px; background: none; border: none; cursor: pointer; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.35s var(--ease); -webkit-tap-highlight-color: transparent; }
    #gv-curtain { position: absolute; inset: 0; background: var(--gv-bg, var(--bg)); opacity: 0; pointer-events: none; z-index: 12; }
    .gv-media:hover .gv-arrow { opacity: 1; }
    .gv-arrow:disabled { opacity: 0 !important; cursor: default; }
    .gv-arrow::before { content: ''; display: block; width: 13px; height: 13px;
      border-top: 1.5px solid var(--gv-fg, var(--fg)); border-right: 1.5px solid var(--gv-fg, var(--fg));
      opacity: 0.22; transition: opacity 0.25s; }
    .gv-arrow:not(:disabled):hover::before { opacity: 0.75; }
    .gv-arrow-prev { left: 0; }
    .gv-arrow-next { right: 0; }
    .gv-arrow-prev::before { transform: rotate(-135deg); margin-left: 16px; }
    .gv-arrow-next::before { transform: rotate(45deg); margin-right: 16px; }

    /* Prev / Next controls bar */
    .gv-controls { display: flex; align-items: center; justify-content: center; gap: 0; padding: 10px 24px 16px; flex-shrink: 0; border-top: 1px solid var(--gv-bg2, var(--bg2)); position: relative; }
    .gv-ctrl-btn { background: none; border: 1px solid var(--gv-fg-dimmer, var(--fg-dimmer)); cursor: pointer; font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gv-fg, var(--fg)); padding: 7px 18px; transition: border-color 0.2s, color 0.2s; }
    .gv-ctrl-btn:hover:not(:disabled) { border-color: var(--gv-fg-dim, var(--fg-dim)); }
    .gv-ctrl-btn:disabled { opacity: 0.22; cursor: default; }
    .gv-ctrl-counter { font-size: 10px; letter-spacing: 0.1em; color: var(--gv-fg-dim, var(--fg-dim)); min-width: 72px; text-align: center; }
    /* Project info shown in portrait mobile gallery viewer (hidden by
       default — only the per-orientation media queries reveal it). */
    .gv-info { display: none; }
    .gv-info-client { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
    .gv-info-title { font-family: var(--font-serif); font-size: 16px; font-style: italic; color: var(--gv-fg, var(--fg)); line-height: 1.3; }
    .gv-back-btn { display: none; background: none; border: none; cursor: pointer; font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gv-fg-dim, var(--fg-dim)); padding: 7px 0; transition: color 0.2s; }
    .gv-back-btn:hover { color: var(--gv-fg, var(--fg)); }

    /* Nav info shown when gallery viewer is open */
    .gv-nav-info { display: none; }
    body.nav-left.gv-open .gv-nav-info { display: block; position: absolute; bottom: 32px; left: 28px; right: 28px; }
    .gv-nav-client { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
    .gv-nav-title { font-family: var(--font-serif); font-size: 15px; font-style: italic; color: var(--fg); line-height: 1.3; margin-bottom: 10px; }
    .gv-nav-counter { font-size: 9px; letter-spacing: 0.1em; color: var(--fg-dim); margin-bottom: 18px; }
    .gv-nav-back { font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-dim); background: none; border: none; cursor: pointer; font-family: var(--font-sans); padding: 0; transition: color 0.2s; }
    .gv-nav-back:hover { color: var(--fg); }

    /* Lightbox image mode — natural aspect ratio instead of forced 16:9 */
    .lb-image-wrap.lb-image-mode { aspect-ratio: auto; width: 100%; height: 68vh; }
    .lb-image-wrap.lb-image-mode img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .lb-lowres { margin-top: 8px; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--lb-fg-dimmer); display: none; }

    /* ── ABOUT ── */
    .about-wrap { max-width: 680px; margin: 0 auto; padding: 72px 44px 100px; }
    body.nav-left .about-wrap { position: relative; left: calc(-1 * var(--nav-w) / 2); }
    .about-eyebrow { font-size: 9px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--fg-dim); margin-bottom: 36px; }
    .about-layout { display: flex; flex-direction: column; gap: 28px; align-items: flex-start; }
    .about-layout.placement-left  { flex-direction: row; align-items: flex-start; }
    .about-layout.placement-right { flex-direction: row-reverse; align-items: flex-start; }
    .about-photo-frame { flex-shrink: 0; overflow: hidden; position: relative; border: 1px solid var(--fg-dimmer); }
    .about-photo-frame.shape-circle { width: 150px; height: 150px; border-radius: 50%; }
    .about-photo-frame.shape-square { width: 150px; height: 150px; border-radius: 3px; }
    .about-photo-frame.shape-natural { border-radius: 2px; }
    .about-photo-img { display: block; }
    .about-photo-frame.shape-circle .about-photo-img,
    .about-photo-frame.shape-square .about-photo-img { width: 100%; height: 100%; object-fit: cover; }
    .about-photo-frame.shape-natural .about-photo-img { max-width: var(--photo-natural-maxw, 380px); max-height: var(--photo-natural-maxh, 280px); width: auto; height: auto; }
    .about-layout.placement-above .about-photo-frame.shape-natural.photo-full-width { width: 100%; }
    .about-layout.placement-above .about-photo-frame.shape-natural.photo-full-width .about-photo-img { width: 100%; max-width: none; max-height: none; height: auto; }
    .about-content { flex: 1; }
    .about-bio { font-family: var(--font-serif); font-size: 20px; font-weight: 400; line-height: 1.75; color: var(--fg); margin-bottom: 12px; }
    .about-bio2 { font-family: var(--font-serif); font-size: 17px; font-weight: 400; line-height: 1.8; color: var(--fg-mid); margin-bottom: 36px; }
    .about-contact-line { font-size: 12px; color: var(--fg-dim); font-style: italic; margin-bottom: 56px; }
    .about-contact-line a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
    .about-contact-line a:hover { color: var(--fg); }
    .about-divider { width: 40px; height: 1px; background: var(--fg-dimmer); margin-bottom: 44px; }
    .about-social-divider { height: 1px; background: var(--fg-dimmer); margin-top: 44px; margin-bottom: 44px; margin-left: -44px; margin-right: -44px; }
    .about-col-label { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--fg-dim); margin-bottom: 16px; }
    .about-col-list { list-style: none; }
    .about-col-list li { font-family: var(--font-serif); font-size: 15px; color: var(--fg-mid); line-height: 2; }
    .about-footer { border-top: 1px solid var(--fg-dimmer); padding-top: 28px; margin-top: 28px; margin-left: -44px; margin-right: -44px; padding-left: 44px; padding-right: 44px; }
    .about-footer p { font-size: 12px; color: var(--fg-dim); line-height: 2.4; }
    .about-social-links { display: flex; flex-wrap: wrap; gap: 18px; margin-top: 56px; align-items: center; }
    .about-social-links a { display: flex; align-items: center; color: var(--accent); text-decoration: none; transition: opacity 0.2s; opacity: 0.5; }
    .about-social-links a:hover { opacity: 1; }
    .about-social-links svg { display: block; }

    /* logo wall */
    .about-logo-wall { --logo-gold: grayscale(1) sepia(0.75) saturate(1.7) hue-rotate(5deg) brightness(0.88); display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 8px 24px; margin-top: 16px; padding-bottom: 8px; }
    .about-logo-wall img { height: 28px; width: auto; max-width: 160px; object-fit: contain; display: block; transition: filter 0.25s ease, opacity 0.25s ease; }
    /* dark mode: all logos gold at rest, reveal true on hover */
    .about-logo-wall img                 { filter: var(--logo-gold); opacity: 0.7; }
    .about-logo-wall img:hover           { filter: none;              opacity: 1; }
    .about-logo-wall img.logo-dark       { filter: grayscale(1) invert(1) var(--logo-gold); opacity: 0.7; }
    .about-logo-wall img.logo-dark:hover { filter: grayscale(1) invert(1);                  opacity: 1; }
    .about-logo-wall img.logo-color       { filter: var(--logo-gold); opacity: 0.7; }
    .about-logo-wall img.logo-color:hover { filter: none;             opacity: 1; }
    /* light mode: same gold logic, white logos need invert first */
    [data-theme="light"] .about-logo-wall img                 { filter: invert(1) var(--logo-gold); opacity: 0.7; }
    [data-theme="light"] .about-logo-wall img:hover           { filter: invert(1);                  opacity: 1; }
    [data-theme="light"] .about-logo-wall img.logo-dark       { filter: var(--logo-gold);            opacity: 0.7; }
    [data-theme="light"] .about-logo-wall img.logo-dark:hover { filter: none;                       opacity: 1; }
    [data-theme="light"] .about-logo-wall img.logo-color       { filter: var(--logo-gold);           opacity: 0.7; }
    [data-theme="light"] .about-logo-wall img.logo-color:hover { filter: none;                      opacity: 1; }

    /* ── CONTACT ── */
    .contact-wrap { max-width: 560px; margin: 0 auto; padding: 72px 44px 100px; }
    .contact-card { margin-bottom: 52px; }
    .contact-card-name { font-family: var(--font-serif); font-size: 22px; font-weight: 400; color: var(--fg); margin-bottom: 10px; }
    .contact-card-email { display: inline-block; font-size: 13px; color: var(--accent); text-decoration: none; letter-spacing: 0.04em; transition: opacity 0.2s; }
    .contact-card-email:hover { opacity: 0.7; }
    .contact-card-divider { height: 1px; background: var(--fg-dimmer); margin: 32px 0; }
    /* Optional photo on the contact page — side-by-side with the card on
       desktop, stacks above on mobile. */
    .contact-layout { display: flex; flex-direction: row; gap: 36px; align-items: flex-start; }
    .contact-photo-frame { flex: 0 0 auto; max-width: 380px; overflow: hidden; border: 1px solid var(--fg-dimmer); border-radius: 2px; }
    .contact-photo-frame img { display: block; width: 100%; height: auto; }
    .contact-content { flex: 1; min-width: 0; }
    .contact-field { margin-bottom: 22px; }
    .contact-field label { display: block; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--fg-mid); margin-bottom: 8px; font-weight: 400; }
    .contact-field input,
    .contact-field textarea { width: 100%; background: var(--bg2); border: 1px solid var(--fg-dimmer); border-radius: 3px; padding: 10px 14px; color: var(--fg); font-family: var(--font-sans); font-size: 14px; font-weight: 300; transition: border-color 0.2s; outline: none; }
    .contact-field input:focus,
    .contact-field textarea:focus { border-color: var(--fg-dim); }
    .contact-field textarea { resize: vertical; min-height: 130px; }
    .contact-submit { background: none; border: 1px solid var(--fg-dim); color: var(--fg-mid); font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; padding: 12px 32px; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
    .contact-submit:hover { border-color: var(--accent); color: var(--fg); }
    .contact-submit:disabled { opacity: 0.4; cursor: default; }
    .contact-result { margin-top: 18px; font-size: 13px; color: var(--fg-mid); min-height: 20px; }

    /* ── SPLASH ── */
    #splash { position: fixed; inset: 0; z-index: 800; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s var(--ease); }
    #splash.fading { opacity: 0; pointer-events: none; }
    #splash.gone { display: none; }
    .splash-video-bg { position: absolute; inset: 0; overflow: hidden; }
    .splash-video-bg iframe,
    .splash-video-bg video { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 140%; height: 140%; object-fit: cover; pointer-events: none; }
    .splash-overlay { position: absolute; inset: 0; background: rgba(19,17,16,0.6); }
    .splash-content { position: relative; z-index: 1; text-align: center; }
    .splash-name { font-family: var(--font-serif); font-size: clamp(28px, 5vw, 52px); font-weight: 400; font-style: italic; color: var(--fg); letter-spacing: 0.02em; margin-bottom: 10px; }
    .splash-title-text { font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--fg-mid); margin-bottom: 40px; }
    .splash-skip { background: none; border: none; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-dim); cursor: pointer; transition: color 0.2s; font-family: var(--font-sans); }
    .splash-skip:hover { color: var(--accent); }

    /* ── PREVIEW ── */
    .preview-banner { position: fixed; top: 0; left: 0; right: 0; z-index: 210; background: var(--accent); color: #1a1714; text-align: center; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; padding: 5px 12px; font-weight: 600; }
    body.is-preview { padding-top: 28px; }
    body.is-preview nav { top: 28px; }
    .grid-item .preview-hide-btn { position: absolute; top: 6px; right: 6px; z-index: 10; width: 22px; height: 22px; border-radius: 50%; border: none; background: rgba(0,0,0,0.65); color: #fff; font-size: 15px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.15s; }
    .grid-item:hover .preview-hide-btn { opacity: 1; }
    .grid-draft-badge { position: absolute; top: 6px; left: 6px; z-index: 10; background: rgba(0,0,0,0.65); color: var(--accent); font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; padding: 2px 6px; border-radius: 2px; pointer-events: none; }
    .mobile-item .preview-hide-btn { margin-left: auto; flex-shrink: 0; background: var(--bg3); border: 1px solid var(--fg-dimmer); color: var(--fg-dim); width: 24px; height: 24px; border-radius: 50%; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .preview-tray { padding: 16px 6px 24px; border-top: 1px solid var(--fg-dimmer); margin-top: 3px; }
    .preview-tray-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--fg-dim); margin-bottom: 10px; }
    .preview-tray-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .preview-chip { background: var(--bg2); border: 1px solid var(--fg-dimmer); color: var(--fg-dim); border-radius: 20px; padding: 4px 12px; font-size: 11px; letter-spacing: 0.04em; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: border-color 0.15s, color 0.15s; }
    .preview-chip:hover { border-color: var(--accent); color: var(--fg); }
    .preview-chip-restore { color: var(--accent); font-size: 13px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      :root { --nav-h: 56px; --safe-top: env(safe-area-inset-top, 0px); }
      /* Path B: body becomes a non-scrolling fixed viewport container, main
         is the scroll container. This sidesteps the iOS Safari bug where
         scrolled body content gets composited above position:fixed elements
         during scroll regardless of z-index, GPU hints, or sticky tricks.
         With body not scrolling, nav has no scroll-layer to compete with. */
      body {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        overflow: hidden;
      }
      main, body.nav-left main {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
        padding-top: calc(var(--nav-h) + var(--safe-top));
      }
      .about-wrap, .contact-wrap { overflow-x: hidden; max-width: 100%; }
      /* Stack contact photo above card on portrait mobile */
      .contact-layout { flex-direction: column; gap: 24px; }
      .contact-photo-frame { max-width: 100%; }
      nav {
        position: fixed;
        top: 0;
        padding-top: var(--safe-top);
        padding-left: 20px; padding-right: 20px;
        height: calc(var(--nav-h) + var(--safe-top));
        box-shadow: 0 -100vh 0 0 var(--bg);
        border-bottom: none;
      }
      .nav-brand-name { font-size: 17px; }
      .nav-brand-rule, .nav-brand-title { display: none; }
      .nav-links { display: none; }
      .nav-hamburger { display: flex; }
      .gallery-grid { display: none !important; }
      .mobile-list { display: block; padding: 4px 0 32px; }
      .about-wrap { padding: 16px 22px 40px; }
      body.nav-left .about-wrap { left: 0; }
      /* Portrait mobile reveal: each item slides up + fades in as it
         enters the viewport (managed by IntersectionObserver in JS,
         which adds .in-view). Uses a keyframe animation rather than
         a transition so it always fires reliably — transitions can be
         skipped by the browser when initial style and class-change
         happen in the same paint frame. */
      /* Reveal animation removed — items appear immediately on portrait
         mobile. The base gridIn cascade is also disabled so items don't
         scale/fade in. */
      .mobile-item { animation: none; }
      /* Project info under the image in portrait gallery viewer.
         Larger top padding pushes the text block down so it sits
         closer to the prev/next/counter bar at the bottom, balancing
         the empty space above and below the image. */
      .gv-info { display: block; padding: 20px max(20px, env(safe-area-inset-left, 0px)) 16px; flex-shrink: 0; text-align: center; }
      .gv-info-client { margin-bottom: 2px; }
      .contact-wrap { padding: 52px 22px 80px; }
      .about-layout.placement-left,
      .about-layout.placement-right { flex-direction: column; }
      .about-photo-frame.shape-circle,
      .about-photo-frame.shape-square { width: 120px; height: 120px; }
      .about-photo-frame.shape-natural .about-photo-img { max-width: min(var(--photo-natural-maxw, 380px), 100%); max-height: var(--photo-natural-maxh, 280px); }
      .about-layout.placement-above .about-photo-frame.shape-natural.photo-full-width .about-photo-img { max-width: none; max-height: none; }
      .about-eyebrow { font-size: 8px; letter-spacing: 0.28em; margin-bottom: 28px; }
      .about-bio { font-size: 19px; line-height: 1.7; }
      .about-bio2 { font-size: 15px; line-height: 1.75; }
      /* Mobile: keep the email line readable but no button styling — just
         a slightly larger, regular-weight version of the desktop link. */
      .about-contact-line {
        font-size: 14px;
        font-style: normal;
        color: var(--fg);
        margin-top: 28px;
        margin-bottom: 40px;
        line-height: 1.6;
      }
      .about-col-list li { font-size: 14px; line-height: 2.1; }
      .lb-inner { padding: 0 12px; }
      .lb-meta { flex-direction: column; gap: 18px; margin-top: 16px; }
      .lb-client { font-size: 9px; margin-bottom: 4px; }
      .lb-title { font-size: 18px; }
      /* Lightbox: controls pinned to bottom of screen — don't jump with image aspect ratio */
      .lb-controls {
        position: fixed; bottom: 0; left: 0; right: 0; width: auto;
        padding: 12px max(20px, env(safe-area-inset-left, 0px)) max(20px, env(safe-area-inset-bottom, 0px));
        justify-content: space-between;
        background: linear-gradient(transparent, var(--lb-bg) 55%);
      }
      .lb-btn { font-size: 9px; padding: 10px 18px; }
      .lb-close { top: 20px; right: auto; left: max(18px, env(safe-area-inset-left, 0px)); font-size: 10px; }
      /* Give lightbox bottom breathing room so image isn't hidden under fixed controls */
      .lightbox { padding-bottom: 80px; }
      body.lb-open nav { visibility: hidden; pointer-events: none; }
      .lb-desc { font-size: 11px; max-height: calc(1.7em * 3); }

      /* Left nav collapses to top nav on mobile */
      body.nav-left nav {
        position: fixed; top: 0; left: 0; right: 0; bottom: auto;
        width: 100%; height: calc(var(--nav-h) + var(--safe-top));
        padding: var(--safe-top) 20px 0; box-sizing: border-box;
        flex-direction: row; align-items: center; justify-content: space-between;
        border-bottom: none;
      }
      body.nav-left .nav-brand { flex-direction: row; align-items: baseline; gap: 14px; margin-bottom: 0; }
      body.nav-left .nav-brand-name { font-size: 17px; }
      body.nav-left .nav-brand-rule { display: none; }
      body.nav-left .nav-brand-title { display: none; }
      body.nav-left .nav-right { flex-direction: row; align-items: center; flex: none; width: auto; }
      body.nav-left .nav-links { display: none; }
      body.nav-left .nav-hamburger { display: flex !important; }
      body.nav-left .nav-drawer { display: block !important; max-height: 0; }
      body.nav-left .nav-drawer.open { max-height: 500px; padding: 16px 24px 20px; }
      body.nav-left .theme-toggle { margin-top: 0; }
      body.nav-left main { padding-left: 0; padding-top: calc(var(--nav-h) + var(--safe-top)); }
      body.nav-left .gv { left: 0; top: calc(var(--nav-h) + var(--safe-top)); }
      body.nav-left .gv-nav-info { display: none !important; }
      /* Gallery viewer: back button top-left, prev/next spread to bottom edges */
      .gv-back-btn {
        display: block; position: fixed;
        top: calc(var(--nav-h) + var(--safe-top) + 14px);
        left: max(18px, env(safe-area-inset-left, 0px));
        width: auto; padding: 2px 0; z-index: 20;
      }
      /* Top padding clears the BACK button (which is at top: nav-h + safe-top + 14px)
         and gives a comfortable visual gap below it before the image starts. */
      .gv-media { padding: calc(var(--safe-top) + 50px) 0 0; }
      .gv-arrow { display: none; } /* use labeled buttons on mobile */
      .gv-ctrl-btn { display: block; font-size: 9px; padding: 7px 12px; }
      .gv-ctrl-counter { min-width: 48px; }
      .gv-controls {
        width: 100%; padding: 12px max(20px, env(safe-area-inset-left, 0px)) max(20px, env(safe-area-inset-bottom, 0px));
        flex-wrap: nowrap; justify-content: space-between; border-top: none;
      }
      body.is-preview.nav-left nav { top: 28px; height: var(--nav-h); right: 0; width: 100%; bottom: auto; }
      body.is-preview.nav-left main { padding-top: var(--nav-h); }
    }

    @media (max-height: 600px) and (orientation: landscape) {
      /* ── LANDSCAPE: compact top nav regardless of nav-style setting ── */
      :root { --nav-h: 40px; }

      /* Force top-bar layout for both default and left-nav configs */
      nav, body.nav-left nav {
        top: 0; left: 0; right: 0; bottom: auto;
        width: 100%; height: var(--nav-h);
        padding: 0 10%; box-sizing: border-box;
        flex-direction: row; align-items: center; justify-content: space-between;
        border-bottom: none; border-right: none;
      }
      /* Drawer inset to match the 15% gallery margins (no underline) */
      nav::after, body.nav-left nav::after { display: none; }
      /* Content starts below the 40px nav; 15% side margins so theme color frames the gallery */
      main, body.nav-left main { padding-top: var(--nav-h); padding-left: 10%; padding-right: 10%; }
      /* Kill any sidebar-style sub-element overrides */
      body.nav-left .nav-brand { flex-direction: row; align-items: baseline; gap: 10px; margin-bottom: 0; }
      body.nav-left .nav-brand-name { font-size: 17px; }
      body.nav-left .nav-brand-rule, body.nav-left .nav-brand-title { display: none; }
      body.nav-left .nav-right { flex-direction: row; align-items: center; flex: none; width: auto; }
      body.nav-left .nav-links { display: none; }
      body.nav-left .nav-hamburger { display: flex !important; }
      body.nav-left .nav-hamburger span { width: 25px; }
      body.nav-left .theme-toggle { margin-top: 0; }
      body.nav-left .gv { left: 0; top: var(--nav-h); }

      .nav-brand-name { font-size: 17px; }
      .nav-hamburger span { width: 25px; }
      /* Drawer inset to match gallery width */
      .nav-drawer { left: 10%; right: 10%; }
      .nav-drawer.open { padding: 6px 16px 10px; max-height: calc(100dvh - var(--nav-h) - 16px); overflow-y: auto; }
      .nav-drawer a { padding: 8px 0 8px 10px; font-size: 10px; }
      /* Allow drawer to open in landscape (desktop hides it with !important) */
      body.nav-left .nav-drawer { display: block !important; max-height: 0; overflow: hidden; left: 10%; right: 10%; }
      body.nav-left .nav-drawer.open { max-height: calc(100dvh - var(--nav-h) - 16px); padding: 6px 16px 10px; overflow-y: auto; }

      /* Grid: show masonry instead of the full-width mobile list */
      .gallery-grid { display: block !important; }
      .mobile-list { display: none !important; }

      /* About: cancel the desktop nav-left side-nav left-shift since
         landscape uses a top bar, not a side nav. Tighter padding to
         nudge content toward the top, matching portrait spacing. */
      body.nav-left .about-wrap { left: 0; }
      .about-wrap { padding: 16px 44px 12px; }
      .contact-wrap { padding: 16px 44px 24px; }
      /* Tight eyebrow gap in landscape — was 36px which created a big
         band above the photo/text block. Pulls block up toward heading. */
      .about-eyebrow { margin-bottom: 8px; }
      /* Force side-by-side layout in landscape regardless of the explicit
         placement choice — a tall portrait photo set to "above" otherwise
         dominates the viewport and pushes all text below the fold. Photo
         on the left, text to the right of it, no big white space. */
      .about-layout {
        flex-direction: row !important;
        align-items: flex-start;
        gap: 24px;
      }
      .about-photo-frame.shape-natural.photo-full-width {
        width: auto !important;
      }
      .about-photo-frame.shape-natural .about-photo-img,
      .about-photo-frame.shape-natural.photo-full-width .about-photo-img {
        width: auto !important;
        max-width: 40vw;
        /* Use svh (smallest viewport height) instead of dvh so the photo
           stays the same size when iOS Safari's URL bar collapses on
           scroll — sized once for URL-bar-visible state and stays put. */
        max-height: calc(100svh - 120px);
        height: auto;
      }

      /* Viewer covers the full viewport — sits above the nav (z-index 200) */
      .gv.open {
        z-index: 300 !important;
        top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
      }

      /* Gallery viewer: position:fixed pins gv-media directly to the viewport.
         Top/bottom padding gives the BACK button and counter pill their
         own clear space — image is shrunk to fit, AR preserved by object-fit
         contain on .gv-img. Reads as a deliberate matte frame. */
      .gv-media { position: fixed; inset: 0; z-index: 301; flex: none; box-sizing: border-box;
                  /* horizontal padding clears BACK button (top-left) and prev/next
                     arrows (both edges); 12px bottom matches earlier spacing */
                  padding: 0 max(80px, env(safe-area-inset-left, 0px) + 70px) 12px max(80px, env(safe-area-inset-right, 0px) + 70px); }
      .gv-img { width: 100%; height: 100%; }
      /* iframe: constrain by height in landscape (56.25vw overshoots short viewport) */
      .gv-iframe { height: 100%; width: auto; aspect-ratio: 16 / 9; max-width: 100%; }
      /* Pull back button out of bottom controls, pin to upper-left.
         z-index 302 keeps it above gv-media (301). */
      .gv-back-btn {
        display: block; position: fixed; top: 8px; left: max(18px, env(safe-area-inset-left, 0px));
        width: auto; text-align: left; padding: 2px 0;
        font-size: 10px; z-index: 302;
      }
      /* Move lb-close from upper-right to upper-left in landscape; match gallery back button */
      .lb-close { top: 8px; right: auto; left: max(18px, env(safe-area-inset-left, 0px)); font-size: 10px; }

      /* Side arrows: show at left/right edges instead of bottom Prev/Next buttons */
      .gv-arrow { display: flex !important; opacity: 1; }
      .gv-arrow::before { opacity: 0.45; }
      /* Inset arrows to clear camera cutout and rounded corners */
      .gv-arrow-prev { left: max(16px, env(safe-area-inset-left, 0px)); }
      .gv-arrow-next { right: max(16px, env(safe-area-inset-right, 0px)); }
      #gv-ctrl-prev, #gv-ctrl-next { display: none !important; }

      /* Controls: pull out of flex flow so gv-media fills the full viewport height.
         Counter floats bottom-left, aligned with the back button above it. */
      .gv-controls {
        position: fixed;
        bottom: max(8px, env(safe-area-inset-bottom, 0px));
        left: max(18px, env(safe-area-inset-left, 0px));
        right: auto;
        padding: 0;
        border: none;
        background: none;
        z-index: 302;
      }

      /* Lightbox: cover full visual viewport; close button floats independently */
      .lightbox { padding-top: 0; box-sizing: border-box; }
      /* Video sized to visual viewport height via JS-set --vv-h; 100dvh as fallback */
      .lb-image-wrap { aspect-ratio: auto; height: calc(var(--vv-h, 100dvh) - 44px); width: min(100%, calc((var(--vv-h, 100dvh) - 44px) * 1.7778)); }
      /* Hide title/buttons; float counter bottom-left to match gallery counter */
      .lb-info { display: none; }
      #lb-prev, #lb-next { display: none; }
      .lb-meta { margin: 0; min-height: 0; }
      .lb-counter { position: fixed; bottom: max(8px, env(safe-area-inset-bottom, 0px)); left: max(18px, env(safe-area-inset-left, 0px)); }
      .lb-inner { position: relative; }
      .lb-float-prev, .lb-float-next { display: flex; -webkit-tap-highlight-color: transparent; }
      /* Full-height tap zones so arrows are centred on the image */
      .lb-float-prev { left: max(16px, env(safe-area-inset-left, 0px)); top: 0; }
      .lb-float-next { right: max(16px, env(safe-area-inset-right, 0px)); top: 0; }
    }

    /* ── SAFE AREA TOP COVER ── */
    /* Always keeps the status-bar zone filled with the background colour and
       in front of any content that might bleed into it (portrait mobile).
       transform/will-change forces a separate iOS Safari compositing layer
       so scrolled content doesn't end up rendered above this element. */
    #safe-area-top {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: env(safe-area-inset-top, 0px);
      background: var(--bg);
      z-index: 201; /* just above nav (200), below preview-banner (210) & lightbox (500) */
      pointer-events: none;
      transform: translateZ(0);
      -webkit-transform: translate3d(0, 0, 0);
      will-change: transform;
    }

    @media (max-width: 400px) {
      .mobile-title { font-size: 15px; }
      .mobile-meta { padding: 12px 16px 16px; }
      .about-bio { font-size: 17px; }
      .lb-title { font-size: 16px; }
    }
  </style>
</head>
<body>

  <!-- Safe-area top cover: keeps status-bar zone in background colour, always in front -->
  <div id="safe-area-top" aria-hidden="true"></div>

  <!-- Splash -->
  <div id="splash" class="gone">
    <div class="splash-video-bg" id="splash-video-bg"></div>
    <div class="splash-overlay"></div>
    <div class="splash-content">
      <div class="splash-name" id="splash-name"></div>
      <div class="splash-title-text" id="splash-title"></div>
      <button class="splash-skip" onclick="dismissSplash()">Enter ↗</button>
    </div>
  </div>

  <!-- Nav -->
  <nav>
    <a class="nav-brand" href="#" onclick="event.preventDefault();showFirst()">
      <span class="nav-brand-name" id="nav-name"></span>
      <span class="nav-brand-rule" id="nav-rule" style="display:none"></span>
      <span class="nav-brand-title" id="nav-title-el"></span>
    </a>
    <div class="nav-right">
      <ul class="nav-links" id="nav-links"></ul>
      <div class="gv-nav-info" id="gv-nav-info">
        <div class="gv-nav-client" id="gv-nav-client"></div>
        <div class="gv-nav-title" id="gv-nav-title"></div>
        <div class="gv-nav-counter" id="gv-nav-counter"></div>
        <button class="gv-nav-back" onclick="closeGallery()">← Back</button>
      </div>
      <button class="theme-toggle hidden" id="theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme">◐</button>
      <button class="nav-hamburger" onclick="toggleDrawer()"><span></span><span></span></button>
    </div>
  </nav>

  <div class="nav-drawer" id="nav-drawer"></div>

  <main id="main-content"></main>

  <!-- Gallery Viewer -->
  <div id="gallery-viewer" class="gv" onclick="if(event.target===this)closeGallery()">
    <div class="gv-media" id="gv-media" onclick="if(event.target===this)closeGallery()">
      <img id="gv-img" class="gv-img" src="" alt="">
      <iframe id="gv-iframe" class="gv-iframe" src="" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen style="display:none"></iframe>
      <button class="gv-arrow gv-arrow-prev" id="gv-prev" onclick="this.disabled?closeGallery():galleryNav(-1)" aria-label="Previous" disabled></button>
      <button class="gv-arrow gv-arrow-next" id="gv-next" onclick="this.disabled?closeGallery():galleryNav(1)"  aria-label="Next"></button>
      <div id="gv-curtain"></div>
    </div>
    <div class="gv-info" id="gv-info">
      <div class="gv-info-client" id="gv-info-client"></div>
      <div class="gv-info-title"  id="gv-info-title"></div>
    </div>
    <div class="gv-controls">
      <button class="gv-back-btn" onclick="closeGallery()">← Back</button>
      <button class="gv-ctrl-btn" id="gv-ctrl-prev" onclick="galleryNav(-1)" disabled>← Prev</button>
      <div class="gv-ctrl-counter" id="gv-ctrl-counter"></div>
      <button class="gv-ctrl-btn" id="gv-ctrl-next" onclick="galleryNav(1)">Next →</button>
    </div>
  </div>

  <!-- Share password prompt -->
  <div id="share-prompt" style="display:none;position:fixed;inset:0;z-index:900;background:var(--bg);align-items:center;justify-content:center;flex-direction:column;gap:14px">
    <div style="font-family:var(--font-serif);font-size:22px;font-style:italic;color:var(--fg)">Password protected</div>
    <div style="font-size:10px;letter-spacing:0.16em;color:var(--fg-dim);text-transform:uppercase">Enter the password to view this project</div>
    <input id="share-prompt-input" type="password" placeholder="Password" style="font-family:var(--font-sans);font-size:14px;background:var(--bg2);border:1px solid var(--fg-dimmer);color:var(--fg);padding:10px 14px;border-radius:2px;width:260px;outline:none;margin-top:4px" />
    <div id="share-prompt-error" style="display:none;font-size:10px;color:#c0392b;letter-spacing:0.12em;text-transform:uppercase">Incorrect password</div>
    <button id="share-prompt-submit" style="font-family:var(--font-sans);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;background:var(--fg);color:var(--bg);border:none;padding:10px 28px;cursor:pointer;border-radius:2px;margin-top:4px">View</button>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" onclick="closeLbOverlay(event)">
    <button class="lb-close" onclick="closeLb()">← Back</button>
    <div class="lb-inner">
      <button class="lb-float-prev" id="lb-float-prev" onclick="event.stopPropagation();lbNav(-1)" aria-label="Previous"><svg width="10" height="18" viewBox="0 0 10 18" fill="none"><path d="M9 1L1 9l8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <button class="lb-float-next" id="lb-float-next" onclick="event.stopPropagation();lbNav(1)"  aria-label="Next"><svg width="10" height="18" viewBox="0 0 10 18" fill="none"><path d="M1 1l8 8-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <div class="lb-image-wrap" id="lb-frame"></div>
      <div class="lb-meta">
        <div class="lb-info">
          <div class="lb-client" id="lb-client"></div>
          <h2 class="lb-title" id="lb-title"></h2>
          <div class="lb-award" id="lb-award"></div>
          <div class="lb-desc" id="lb-desc"></div>
          <div class="lb-lowres" id="lb-lowres">Low resolution image</div>
        </div>
        <div class="lb-controls">
          <button class="lb-btn" id="lb-prev" onclick="lbNav(-1)">Prev</button>
          <div class="lb-counter"><span id="lb-current">1</span> / <span id="lb-total">1</span></div>
          <button class="lb-btn" id="lb-next" onclick="lbNav(1)">Next</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ── MODULE-LEVEL CONSTANTS ── */
    const _params     = new URLSearchParams(location.search);
    const isPreview   = _params.get('preview') === '1';
    const forceSplash = _params.get('splash')  === '1';
    const SPLASH_SEEN_KEY = 'cr_splash_seen';

    /* ── STATE ── */
    let siteConfig = { categories: [], about: {}, contact: {}, splash: {} };
    let projects   = [];
    const builtCats    = new Set();
    const previewHidden = new Set();
    let lbCat    = '';
    let lbIdx    = 0;
    let lbShared = null; // project object when opened via share link
    let gvCat    = '';
    let gvIdx    = 0;
    let gvItems  = [];
    let _currentThemeSetting = 'auto';
    let _aboutRendered = false;

    /* ── XSS HELPER ── */
    function x(str) {
      return String(str == null ? '' : str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── INIT ── */
    async function init() {
      try {
        if (isPreview) {
          const _pk     = _params.get('pk');
          const _stored = (_pk && localStorage.getItem('cr_preview_' + _pk))
                        || localStorage.getItem('cr_preview')
                        || sessionStorage.getItem('cr_preview')
                        || '{}';
          const raw  = JSON.parse(_stored);
          siteConfig = raw.siteConfig || raw || {};
          projects   = raw.projects   || [];
          projects.forEach((p, gi) => { if (p.published === false) previewHidden.add(gi); });
        } else {
          const [sRes, pRes] = await Promise.all([fetch('site.json'), fetch('projects.json')]);
          if (sRes.ok) siteConfig = await sRes.json();
          if (pRes.ok) projects   = await pRes.json();
        }
      } catch(e) {
        console.error('Failed to load site data', e);
      }

      siteConfig.categories = siteConfig.categories || [];
      projects = Array.isArray(projects) ? projects : [];

      applyConfig();

      const publishedCats = siteConfig.categories.filter(c => c.published !== false);
      const allCats       = siteConfig.categories;

      buildNav(publishedCats);
      buildPages(isPreview ? allCats : publishedCats);

      // Share link: ?share=ID&key=SHAREKEY — opens any project (incl. unpublished) directly
      const _sp = new URLSearchParams(location.search);
      const _shareId  = _sp.get('share');
      const _shareKey = _sp.get('key');
      const _isShareLink = !!(_shareId && _shareKey);

      if (isPreview) {
        document.body.classList.add('is-preview');
        const banner = document.createElement('div');
        banner.className = 'preview-banner';
        banner.textContent = 'Preview mode — changes not saved to live site';
        document.body.prepend(banner);
        if (forceSplash) {
          sessionStorage.removeItem(SPLASH_SEEN_KEY);
          if (!_isShareLink) maybeShowSplash();
        }
      } else {
        if (!_isShareLink) maybeShowSplash();
      }

      showFirst();

      if (_isShareLink) {
        const _shared = projects.find(p => String(p.id) === _shareId && p.shareKey === _shareKey);
        if (_shared) {
          if (_shared.sharePass) showSharePrompt(_shared);
          else openLbDirect(_shared);
        }
      }
    }

    /* ── APPLY CONFIG ── */
    function applyConfig() {
      const cfg = siteConfig;
      const ownerName  = cfg.ownerName  || '';
      const ownerTitle = cfg.ownerTitle || '';

      // Native-aspect-ratio mobile thumbnails — toggle body class
      document.body.classList.toggle('thumbs-native', !!cfg.mobileThumbsNative);

      if (ownerName) document.title = ownerTitle ? `${ownerName} — ${ownerTitle}` : ownerName;
      document.querySelector('meta[property="og:title"]')?.setAttribute('content', ownerName);
      if (cfg.metaDescription) {
        document.querySelector('meta[name="description"]')?.setAttribute('content', cfg.metaDescription);
        document.querySelector('meta[property="og:description"]')?.setAttribute('content', cfg.metaDescription);
      }
      if (cfg.website) {
        document.querySelector('meta[property="og:url"]')?.setAttribute('content', cfg.website);
        const canonical = document.getElementById('site-canonical');
        if (canonical) canonical.href = cfg.website;
      }

      document.getElementById('nav-name').textContent    = ownerName;
      document.getElementById('nav-title-el').textContent = ownerTitle;
      const rule = document.getElementById('nav-rule');
      if (rule) rule.style.display = ownerTitle ? '' : 'none';

      document.getElementById('splash-name').textContent  = ownerName;
      document.getElementById('splash-title').textContent = ownerTitle;

      if (cfg.accentColor) {
        document.documentElement.style.setProperty('--accent', cfg.accentColor);
      }
      if (cfg.filmGrain !== undefined) {
        document.documentElement.style.setProperty('--film-grain-opacity', cfg.filmGrain);
      }
      if (cfg.thumbnailFilter) {
        const t = cfg.thumbnailFilter / 100;
        document.documentElement.style.setProperty('--thumb-filter', `saturate(${1 - 0.2 * t}) brightness(${1 - 0.15 * t})`);
      } else {
        document.documentElement.style.removeProperty('--thumb-filter');
      }

      const mode = cfg.themeMode || 'auto';
      _currentThemeSetting = mode;
      applyTheme(mode);

      const toggleBtn = document.getElementById('theme-toggle-btn');
      if (toggleBtn) toggleBtn.classList.toggle('hidden', !cfg.allowThemeToggle);

      document.body.classList.toggle('nav-left', cfg.navStyle === 'left');

      if (cfg.viewerBg) document.documentElement.setAttribute('data-viewer-bg', cfg.viewerBg);
      if (cfg.favicon) {
        const prev = document.getElementById('site-favicon');
        const lnk  = document.createElement('link');
        lnk.rel  = 'icon';
        lnk.id   = 'site-favicon';
        lnk.href = cfg.favicon + '?v=' + Date.now();
        if (/\.svg$/i.test(cfg.favicon)) lnk.type = 'image/svg+xml';
        if (prev) prev.replaceWith(lnk); else document.head.appendChild(lnk);
      }
      if (cfg.ogImage) {
        const ogAbs = cfg.ogImage.startsWith('http')
          ? cfg.ogImage
          : (cfg.website || '').replace(/\/$/, '') + '/' + cfg.ogImage.replace(/^\//, '');
        document.querySelector('meta[property="og:image"]')?.setAttribute('content', ogAbs);
        document.querySelector('meta[name="twitter:image"]')?.setAttribute('content', ogAbs);
      }
    }

    function applyTheme(mode) {
      const resolved = mode === 'light' ? 'light'
        : mode === 'dark'  ? 'dark'
        : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', resolved);
      try { localStorage.setItem('kr_theme', resolved); } catch(e) {}
    }

    function toggleTheme() {
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      applyTheme(isLight ? 'dark' : 'light');
    }

    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
      if (_currentThemeSetting === 'auto') applyTheme('auto');
    });

    /* ── NAV ── */
    function buildNav(cats) {
      const linksEl  = document.getElementById('nav-links');
      const drawerEl = document.getElementById('nav-drawer');
      linksEl.innerHTML  = '';
      drawerEl.innerHTML = '';

      function addLink(id, label) {
        const li = document.createElement('li');
        const a  = document.createElement('a');
        a.href = '#' + id;
        a.dataset.page = id;
        a.textContent = label;
        a.onclick = e => { e.preventDefault(); showPage(id); };
        li.appendChild(a);
        linksEl.appendChild(li);

        const da = document.createElement('a');
        da.href = '#' + id;
        da.dataset.page = id;
        da.textContent = label;
        da.onclick = e => { e.preventDefault(); showPage(id); closeDrawer(); };
        drawerEl.appendChild(da);
      }

      cats.forEach(cat => addLink(cat.id, cat.label));
      if (siteConfig.about?.show !== false) addLink('about', 'About');
      const _ctMode = siteConfig.contact?.mode;
      // 'card-only' and 'form' put a Contact link in BOTH desktop nav and drawer
      if ((siteConfig.contact?.enabled || _ctMode === 'card-only') && _ctMode !== 'email-nav') {
        addLink('contact', 'Contact');
      }
      const _navEmail = siteConfig.contact?.email || siteConfig.about?.contactEmail;
      if (_ctMode === 'email-nav' && _navEmail) {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = `mailto:${_navEmail}`;
        a.textContent = _navEmail;
        li.appendChild(a);
        document.getElementById('nav-links').appendChild(li);
      }

      // 'card-mobile-only': drawer-only Contact item with email visible.
      // No desktop nav link, no /contact page. Tap → mailto.
      if (_ctMode === 'card-mobile-only' && _navEmail) {
        const da = document.createElement('a');
        da.className = 'nav-drawer-contact';
        da.href = `mailto:${_navEmail}`;
        da.innerHTML = `<span>Contact</span><span class="nav-drawer-contact-email">${x(_navEmail)}</span>`;
        drawerEl.appendChild(da);
      }

      // showEmailInDrawer: pairs with form/card-only modes. Adds a clickable
      // email line below the existing CONTACT drawer link (mailto on tap).
      if ((_ctMode === 'card-only' || _ctMode === 'form') && siteConfig.contact?.showEmailInDrawer && _navEmail) {
        const ea = document.createElement('a');
        ea.className = 'nav-drawer-contact-email-line';
        ea.href = `mailto:${_navEmail}`;
        ea.textContent = _navEmail;
        drawerEl.appendChild(ea);
      }

      updateDrawerPadding();
    }

    function updateDrawerPadding() {
      const drawerEl = document.getElementById('nav-drawer');
      if (!drawerEl) return;
      const links = drawerEl.querySelectorAll('a');
      const isLandscape = window.innerHeight < 600 && window.innerWidth > window.innerHeight;
      links.forEach(a => {
        a.style.paddingTop = isLandscape ? Math.max(3, Math.min(8, Math.floor(40 / links.length))) + 'px' : '';
        a.style.paddingBottom = a.style.paddingTop;
      });
    }

    /* ── PAGES ── */
    function buildPages(cats) {
      const main = document.getElementById('main-content');
      main.innerHTML = '';

      cats.forEach(cat => {
        const sec = document.createElement('section');
        sec.id = 'page-' + cat.id;
        sec.className = 'page';
        sec.innerHTML = [
          `<div class="gallery-grid${cat.layout === 'grid' ? ' layout-grid' : ''}" id="grid-${x(cat.id)}"></div>`,
          `<div class="mobile-list"  id="mlist-${x(cat.id)}"></div>`,
          isPreview ? `<div class="preview-tray" id="preview-tray-${x(cat.id)}" style="display:none"></div>` : ''
        ].join('');
        main.appendChild(sec);
      });

      // About
      const abt = document.createElement('section');
      abt.id = 'page-about';
      abt.className = 'page';
      abt.innerHTML = '<div class="about-wrap" id="about-container"></div>';
      main.appendChild(abt);

      // Contact — skip rendering the page entirely for 'card-mobile-only'
      // mode (drawer item handles it; no /contact page exists).
      const cc = siteConfig.contact || {};
      if (cc.mode === 'card-mobile-only') return;
      const ctc = document.createElement('section');
      ctc.id = 'page-contact';
      ctc.className = 'page';
      const isCardOnly = cc.mode === 'card-only';
      const showCard = isCardOnly || cc.showCard;
      const cardHtml = showCard && siteConfig.about ? (() => {
        const name  = siteConfig.ownerName || '';
        // Prefer contact-card override email; fall back to About page email
        const email = (siteConfig.contact?.email || siteConfig.about.contactEmail || '');
        return `<div class="contact-card">
          ${name  ? `<div class="contact-card-name">${x(name)}</div>` : ''}
          ${email ? `<a class="contact-card-email" href="mailto:${x(email)}">${x(email)}</a>` : ''}
        </div>
        ${!isCardOnly ? `<div class="contact-card-divider"></div>` : ''}`;
      })() : '';
      // Optional contact photo — renders side-by-side with the card on desktop
      const photoHtml = cc.photo
        ? `<div class="contact-photo-frame"><img src="${x(cc.photo)}" alt="${x(cc.photoAlt || '')}"></div>`
        : '';
      const cardWithFormHtml = `${cardHtml}${!isCardOnly ? `<form id="contact-form" onsubmit="handleContact(event)">
            <div class="contact-field"><label>Name</label><input type="text" name="name" required placeholder="Your name"></div>
            <div class="contact-field"><label>Email</label><input type="email" name="email" required placeholder="your@email.com"></div>
            <div class="contact-field"><label>Message</label><textarea name="message" required placeholder="Tell me about your project..."></textarea></div>
            <button type="submit" id="contact-submit" class="contact-submit">Send Message</button>
            <div id="contact-result" class="contact-result"></div>
          </form>` : ''}`;
      ctc.innerHTML = `
        <div class="contact-wrap">
          <h2 class="about-eyebrow">Get in Touch</h2>
          ${photoHtml ? `<div class="contact-layout">${photoHtml}<div class="contact-content">${cardWithFormHtml}</div></div>` : cardWithFormHtml}
        </div>`;
      main.appendChild(ctc);
    }

    /* ── SHOW PAGE ── */
    function showPage(id) {
      closeGallery();
      const pg = document.getElementById('page-' + id);
      if (!pg) return;

      // Exit-animate the current visible page (leave it display:block via .leaving)
      document.querySelectorAll('.page.visible').forEach(p => {
        if (p === pg) return;
        p.classList.remove('visible');
        p.classList.add('leaving');
        const onEnd = () => { p.classList.remove('leaving'); p.removeEventListener('animationend', onEnd); };
        p.addEventListener('animationend', onEnd);
        // safety: remove leaving class after 300ms in case animationend never fires
        setTimeout(() => p.classList.remove('leaving'), 300);
      });
      // Hide any already-leaving pages that aren't the target
      document.querySelectorAll('.page.leaving').forEach(p => { if (p === pg) p.classList.remove('leaving'); });

      pg.classList.add('visible');
      history.replaceState(null, '', '#' + id);
      window.scrollTo(0, 0);
      // Path B mobile portrait: main is the scroll container, not window
      const mainEl = document.getElementById('main-content');
      if (mainEl) mainEl.scrollTop = 0;

      // update active nav
      document.querySelectorAll('#nav-links a, #nav-drawer a').forEach(a => {
        a.classList.toggle('active', a.dataset.page === id);
      });

      // lazy build
      const cats = isPreview
        ? siteConfig.categories
        : siteConfig.categories.filter(c => c.published !== false);
      if (cats.some(c => c.id === id)) { buildCat(id); reanimateMobileList(id); }

      if (id === 'about') renderAbout();
    }

    function showFirst() {
      const hash = location.hash.slice(1);
      if (hash === 'about')   { showPage('about');   return; }
      if (hash === 'contact') { showPage('contact'); return; }
      const visible = isPreview
        ? siteConfig.categories
        : siteConfig.categories.filter(c => c.published !== false);
      if (hash && visible.some(c => c.id === hash)) { showPage(hash); return; }
      const first = visible[0];
      if (first) { showPage(first.id); return; }
      if (siteConfig.about?.show !== false) showPage('about');
    }

    /* ── AUTO THUMBNAILS ── */
    const _vimeoThumbCache = {};

    function getAutoThumb(p) {
      if (p.thumbnail || !p.url) return null;
      const yt = p.url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
      if (yt) return { type: 'url', url: `https://img.youtube.com/vi/${yt[1]}/hqdefault.jpg` };
      if (/vimeo\.com\/\d+/.test(p.url)) return { type: 'vimeo', vimeoUrl: p.url };
      // Cloudflare Stream — thumbnail available at /thumbnails/thumbnail.jpg
      const cfCustomer = p.url.match(/(https?:\/\/[a-z0-9-]+\.cloudflarestream\.com\/[a-zA-Z0-9]+)/);
      if (cfCustomer) return { type: 'url', url: cfCustomer[1] + '/thumbnails/thumbnail.jpg' };
      const cfWatch = p.url.match(/(?:watch|iframe)\.cloudflarestream\.com\/([a-zA-Z0-9]+)/);
      if (cfWatch) return { type: 'url', url: `https://cloudflarestream.com/${cfWatch[1]}/thumbnails/thumbnail.jpg` };
      // Bunny.net — no reliable public thumbnail URL without pull zone; use placeholder
      return null;
    }

    async function fetchVimeoThumb(vimeoUrl) {
      if (_vimeoThumbCache[vimeoUrl]) return _vimeoThumbCache[vimeoUrl];
      try {
        const res = await fetch(`https://vimeo.com/api/oembed.json?url=${encodeURIComponent(vimeoUrl)}`);
        if (res.ok) {
          const d = await res.json();
          if (d.thumbnail_url) { _vimeoThumbCache[vimeoUrl] = d.thumbnail_url; return d.thumbnail_url; }
        }
      } catch(e) {}
      return null;
    }

    function resolveVimeoThumbs(container) {
      container.querySelectorAll('[data-vimeo-url]').forEach(img => {
        fetchVimeoThumb(img.dataset.vimeoUrl).then(url => {
          if (!url) return;
          img.src = url;
          img.style.display = '';
          const ph = img.nextElementSibling;
          if (ph?.dataset.vimeoPh !== undefined) ph.remove();
        });
      });
    }

    /* ── BUILD CATEGORY ── */
    function buildCat(catId) {
      if (!isPreview && builtCats.has(catId)) return;
      builtCats.add(catId);
