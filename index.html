      const items = previewGetItems(catId);
      buildDesktopGrid(catId, items);
      buildMobileList(catId, items);
      if (isPreview) renderPreviewTray(catId);
    }

    function buildDesktopGrid(cat, items) {
      const grid = document.getElementById('grid-' + cat);
      if (!grid) return;
      grid.innerHTML = '';
      items.forEach((p, i) => {
        const overlayClass = p.overlay || (p.opacity === 0 ? 'reveal' : 'default');
        const hideBtn = isPreview
          ? `<button class="preview-hide-btn" onclick="event.stopPropagation();previewHideProject(${p._gi},'${x(cat)}')" title="Hide">×</button>`
          : '';
        const draftBadge = (isPreview && p.published === false)
          ? `<div class="grid-draft-badge">Draft</div>` : '';
        const auto = getAutoThumb(p);
        const thumbAlt = x(p.alt || p.title || '');
        const thumbHtml = p.thumbnail
          ? `<img src="${x(p.thumbnail)}" class="grid-thumb" loading="lazy" alt="${thumbAlt}">`
          : auto?.type === 'url'
            ? `<img src="${x(auto.url)}" class="grid-thumb" loading="lazy" alt="${thumbAlt}">`
            : auto?.type === 'vimeo'
              ? `<img class="grid-thumb" data-vimeo-url="${x(auto.vimeoUrl)}" style="display:none" alt="${thumbAlt}"><div class="grid-placeholder" data-vimeo-ph><div class="grid-placeholder-icon"></div></div>`
              : `<div class="grid-placeholder"><div class="grid-placeholder-icon"></div></div>`;
        const el = document.createElement('div');
        el.className = 'grid-item' + (overlayClass === 'none' ? ' overlay-none' : '');
        const catDef2 = siteConfig.categories.find(c => c.id === cat);
        el.onclick = catDef2?.type === 'gallery' ? () => openGallery(cat, i) : () => openLb(cat, i);
        // Hover preview accepts either a video file (mp4/webm) or an animated
        // image (webp/gif) — Bunny Stream's auto-generated /preview.webp is
        // typically the lightest and most compatible option.
        const _hpExt = (p.hoverPreview || '').split('?')[0].split('#')[0].toLowerCase().split('.').pop();
        const _hpIsVideo = ['mp4', 'webm', 'mov'].includes(_hpExt);
        const hoverVideoHtml = p.hoverPreview
          ? (_hpIsVideo
              ? `<video class="grid-thumb-video" muted loop playsinline preload="none" data-hover-src="${x(p.hoverPreview)}"></video>`
              : `<img class="grid-thumb-video grid-thumb-preview-img" alt="" data-hover-src="${x(p.hoverPreview)}">`)
          : '';
        el.innerHTML = `
          ${hideBtn}${draftBadge}
          ${thumbHtml}
          ${hoverVideoHtml}
          <div class="grid-scrim" style="background:radial-gradient(circle,rgba(19,17,16,${p.vignette ?? 0.35}) 0%,transparent 70%)"></div>
          <div class="grid-center overlay-${x(overlayClass)}${!p.client ? ' solo' : ''}">
            ${p.client ? `<div class="grid-client">${x(p.client)}</div>` : ''}
            <div class="grid-title">${x(p.title)}</div>
            <div class="grid-play"></div>
            ${p.award ? `<div class="grid-award">${x(p.award)}</div>` : ''}
          </div>`;
        // Hover-to-play handler — only on devices that actually hover (skip
        // touch). Lazy-loads the preview src on first hover so nothing is
        // fetched until needed. Handles both <video> (mp4/webm) and <img>
        // (animated webp/gif) preview elements.
        if (p.hoverPreview && matchMedia('(hover: hover)').matches) {
          const media = el.querySelector('.grid-thumb-video');
          el.addEventListener('mouseenter', () => {
            if (!media) return;
            if (!media.src) media.src = media.dataset.hoverSrc;
            if (media.tagName === 'VIDEO') {
              const playPromise = media.play();
              if (playPromise && playPromise.then) {
                playPromise.then(() => media.classList.add('ready')).catch(() => {});
              } else {
                media.classList.add('ready');
              }
            } else {
              media.classList.add('ready');
            }
          });
          el.addEventListener('mouseleave', () => {
            if (!media) return;
            media.classList.remove('ready');
            if (media.tagName === 'VIDEO') {
              media.pause();
              media.currentTime = 0;
            }
          });
        }
        grid.appendChild(el);
      });
      resolveVimeoThumbs(grid);

      // Masonry layout (JS-positioned, left-to-right order)
      const catDef = siteConfig.categories.find(c => c.id === cat);
      if (catDef?.layout !== 'grid') {
        layoutMasonry(grid);
        grid.querySelectorAll('img.grid-thumb').forEach(img => {
          if (!img.complete) img.addEventListener('load', () => layoutMasonry(grid), { once: true });
        });
      }
    }

    function layoutMasonry(grid, _retry) {
      const COLS = 3, GAP = 3, PAD = 3;
      const items = Array.from(grid.querySelectorAll(':scope > .grid-item'));
      if (!items.length) return;
      const gridW = grid.clientWidth - PAD * 2;
      if (gridW <= 0) {
        // Grid not yet rendered — retry up to 10 frames before giving up
        if ((_retry || 0) < 10) requestAnimationFrame(() => layoutMasonry(grid, (_retry || 0) + 1));
        return;
      }
      const colW  = Math.floor((gridW - GAP * (COLS - 1)) / COLS);
      const colH  = new Array(COLS).fill(0);
      items.forEach(item => {
        const col = colH.indexOf(Math.min(...colH));
        item.style.width = colW + 'px';
        item.style.left  = (PAD + col * (colW + GAP)) + 'px';
        item.style.top   = (PAD + colH[col]) + 'px';
        colH[col] += item.offsetHeight + GAP;
      });
      grid.style.height = (Math.max(...colH) + PAD) + 'px';
    }

    let _masonryRaf;
    window.addEventListener('resize', () => {
      cancelAnimationFrame(_masonryRaf);
      _masonryRaf = requestAnimationFrame(() => {
        document.querySelectorAll('.gallery-grid:not(.layout-grid)').forEach(layoutMasonry);
        updateDrawerPadding();
      });
    });

    /* Reveal animation removed for portrait mobile — items just appear.
       reanimateMobileList is now a no-op stub kept so call sites don't
       need to be touched. */
    function reanimateMobileList(_catId) {}

    function buildMobileList(cat, items) {
      const list = document.getElementById('mlist-' + cat);
      if (!list) return;
      list.innerHTML = '';
      items.forEach((p, i) => {
        const auto = getAutoThumb(p);
        const mobileThumbAlt = x(p.alt || p.title || '');
        const mobileThumbHtml = p.thumbnail
          ? `<img src="${x(p.thumbnail)}" loading="lazy" alt="${mobileThumbAlt}">`
          : auto?.type === 'url'
            ? `<img src="${x(auto.url)}" loading="lazy" alt="${mobileThumbAlt}">`
            : auto?.type === 'vimeo'
              ? `<img data-vimeo-url="${x(auto.vimeoUrl)}" style="display:none" alt=""><div class="mobile-placeholder-icon" data-vimeo-ph></div>`
              : `<div class="mobile-placeholder-icon"></div>`;
        const el = document.createElement('div');
        el.className = 'mobile-item';
        const mCatDef = siteConfig.categories.find(c => c.id === cat);
        el.onclick = mCatDef?.type === 'gallery' ? () => openGallery(cat, i) : () => openLb(cat, i);
        el.innerHTML = `
          <div class="mobile-thumb-wrap">
            ${mobileThumbHtml}
          </div>
          <div class="mobile-meta">
            ${p.client ? `<div class="mobile-client">${x(p.client)}</div>` : ''}
            <div class="mobile-title">${x(p.title)}</div>
            ${p.award ? `<div class="mobile-award">${x(p.award)}</div>` : ''}
            ${isPreview ? `<button class="preview-hide-btn" onclick="event.stopPropagation();previewHideProject(${p._gi},'${x(cat)}')">×</button>` : ''}
          </div>`;
        list.appendChild(el);
      });
      resolveVimeoThumbs(list);
    }

    /* ── PREVIEW HELPERS ── */
    function previewGetItems(catId) {
      if (isPreview) {
        return projects
          .map((p, gi) => ({ ...p, _gi: gi }))
          .filter(p => p.category === catId && !previewHidden.has(p._gi));
      }
      return projects
        .map((p, gi) => ({ ...p, _gi: gi }))
        .filter(p => p.category === catId && p.published !== false);
    }

    function previewHideProject(gi, catId) {
      previewHidden.add(gi);
      builtCats.delete(catId);
      buildCat(catId);
      renderPreviewTray(catId);
    }

    function previewRestoreProject(gi, catId) {
      previewHidden.delete(gi);
      builtCats.delete(catId);
      buildCat(catId);
      renderPreviewTray(catId);
    }

    function renderPreviewTray(catId) {
      const tray = document.getElementById('preview-tray-' + catId);
      if (!tray) return;
      const hidden = projects
        .map((p, gi) => ({ ...p, gi }))
        .filter(p => p.category === catId && previewHidden.has(p.gi));
      if (!hidden.length) { tray.style.display = 'none'; tray.innerHTML = ''; return; }
      tray.style.display = '';
      tray.innerHTML = `
        <div class="preview-tray-label">Hidden from preview</div>
        <div class="preview-tray-chips">
          ${hidden.map(p => `
            <button class="preview-chip" onclick="previewRestoreProject(${p.gi},'${x(catId)}')">
              ${x(p.title)} <span class="preview-chip-restore">+</span>
            </button>`).join('')}
        </div>`;
    }

    /* ── ABOUT ── */

      const soc = a.social || {};

    /* ── CONTACT ── */
    async function handleContact(e) {
      e.preventDefault();
      const endpoint = siteConfig.contact?.endpoint;
      const btn = document.getElementById('contact-submit');
      const res = document.getElementById('contact-result');
      if (!endpoint) { res.textContent = 'Contact form is not configured.'; return; }
      btn.disabled = true;
      btn.textContent = 'Sending…';
      try {
        const r = await fetch(endpoint, {
          method: 'POST',
          body: new FormData(e.target),
          headers: { Accept: 'application/json' }
        });
        res.textContent = r.ok ? 'Thanks! Your message has been sent.' : 'Something went wrong. Please try again.';
        if (r.ok) e.target.reset();
      } catch {
        res.textContent = 'Network error. Please try again.';
      }
      btn.textContent = 'Send Message';
      btn.disabled = false;
    }

    /* ── SCROLL LOCK (iOS Safari safe) ── */
    let _scrollLockY = 0;
    function lockScroll() {
      _scrollLockY = window.scrollY;
      document.body.style.overflow  = 'hidden';
      document.body.style.position  = 'fixed';
      document.body.style.top       = `-${_scrollLockY}px`;
      document.body.style.width     = '100%';
    }
    function unlockScroll() {
      document.body.style.overflow  = '';
      document.body.style.position  = '';
      document.body.style.top       = '';
      document.body.style.width     = '';
      window.scrollTo(0, _scrollLockY);
    }

    /* ── LIGHTBOX ── */
    function fitLightboxToViewport() {
      const lb = document.getElementById('lightbox');
      if (!lb || !window.visualViewport) return;
      const vv = window.visualViewport;
      const landscape = window.innerWidth > window.innerHeight;
      if (landscape) {
        // For position:fixed, top:0 already anchors to the visual viewport top —
        // vv.offsetTop is a document scroll offset and must NOT be used here or
        // the lightbox gets pushed down on a scrolled page, exposing content above.
        // We only need to pin the height to the visual viewport so it doesn't
        // overshoot when the browser chrome is visible.
        lb.style.top    = '';      // let CSS inset:0 → top:0 handle this
        lb.style.bottom = '';      // let CSS inset:0 → bottom:0 handle this
        lb.style.left   = '';
        lb.style.right  = '';
        lb.style.width  = '';
        lb.style.height = vv.height + 'px';
        // Expose height as CSS variable for video sizing
        lb.style.setProperty('--vv-h', vv.height + 'px');
      } else {
        // Portrait: let CSS handle sizing (inset:0); clear any landscape overrides
        lb.style.top = lb.style.bottom = lb.style.left = lb.style.right = '';
        lb.style.width = lb.style.height = '';
        lb.style.removeProperty('--vv-h');
      }
    }
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', fitLightboxToViewport);
      window.visualViewport.addEventListener('scroll', fitLightboxToViewport);
    }

    function openLb(catId, idx) {
      lbShared = null;
      lbCat = catId;
      lbIdx = idx;
      renderLb();
      fitLightboxToViewport();
      document.getElementById('lightbox').classList.add('open');
      document.body.classList.add('lb-open');
      lockScroll();
    }

    async function hashStr(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function showSharePrompt(project) {
      const overlay = document.getElementById('share-prompt');
      const input   = document.getElementById('share-prompt-input');
      const error   = document.getElementById('share-prompt-error');
      overlay.style.display = 'flex';
      input.value = ''; error.style.display = 'none';
      setTimeout(() => input.focus(), 50);
      const submit = async () => {
        const hash = await hashStr(input.value);
        if (hash === project.sharePass) {
          overlay.style.display = 'none';
          openLbDirect(project);
        } else {
          error.style.display = 'block';
          input.value = ''; input.focus();
        }
      };
      document.getElementById('share-prompt-submit').onclick = submit;
      input.onkeydown = e => { if (e.key === 'Enter') submit(); };
    }

    function openLbDirect(p) {
      lbShared = p;
      lbCat    = null;
      lbIdx    = 0;
      renderLb();
      document.getElementById('lightbox').classList.add('open');
      lockScroll();
    }

    function closeLb() {
      lbShared = null;
      document.getElementById('lightbox').classList.remove('open');
      document.body.classList.remove('lb-open');
      document.getElementById('lb-frame').innerHTML = '';
      unlockScroll();
    }

    function closeLbOverlay(e) {
      // Close on tap anywhere except the video frame itself, nav controls, and close button
      if (!e.target.closest('#lb-frame, .lb-controls, .lb-close')) closeLb();
    }

    function lbNav(dir) {
      if (lbShared) return; // single-project share — no navigation
      const frame = document.getElementById('lb-frame');
      frame.style.transition = 'opacity 0.1s ease';
      frame.style.opacity = '0';
      setTimeout(() => {
        const items = previewGetItems(lbCat);
        lbIdx = Math.max(0, Math.min(items.length - 1, lbIdx + dir));
        renderLb();
        frame.style.transition = 'opacity 0.15s ease';
        frame.style.opacity = '1';
      }, 100);
    }

    function renderLb() {
      const isShare = !!lbShared;
      const items   = isShare ? [lbShared] : previewGetItems(lbCat);
      const p       = items[lbIdx];
      if (!p) return;
      const frame = document.getElementById('lb-frame');
      const useImageMode = isImageUrl(p.url) || (!p.url && p.thumbnail);
      frame.classList.toggle('lb-image-mode', useImageMode);
      const lowresEl = document.getElementById('lb-lowres');
      lowresEl.style.display = 'none';
      frame.innerHTML = isVideoUrl(p.url)
        ? `<iframe title="${x(p.title || '')}" src="${x(getEmbedUrl(p.url))}" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen style="width:100%;height:100%"></iframe>`
        : (p.url || p.thumbnail)
          ? `<img src="${x(p.url || p.thumbnail)}" alt="${x(p.title || '')}">`
          : `<div class="lb-ph"><div class="lb-ph-icon"></div></div>`;
      if (useImageMode) {
        const img = frame.querySelector('img');
        if (img) img.addEventListener('load', () => {
          const displayW = frame.offsetWidth;
          const displayH = frame.offsetHeight;
          const scale = Math.max(displayW / img.naturalWidth, displayH / img.naturalHeight);
          lowresEl.style.display = scale > 1.5 ? 'block' : 'none';
        }, { once: true });
      }
      document.getElementById('lb-client').textContent = p.client || '';
      document.getElementById('lb-title').textContent  = p.title  || '';
      const aw = document.getElementById('lb-award');
      aw.textContent  = p.award || ''; aw.style.display = p.award ? 'block' : 'none';
      const desc = document.getElementById('lb-desc');
      desc.textContent = p.description || ''; desc.style.display = p.description ? 'block' : 'none';
      // Hide nav controls when opened via share link (single project)
      const controls = document.getElementById('lb-prev').closest('.lb-controls');
      if (controls) controls.style.display = isShare ? 'none' : '';
      document.getElementById('lb-current').textContent = lbIdx + 1;
      document.getElementById('lb-total').textContent   = items.length;
      document.getElementById('lb-prev').disabled = lbIdx === 0;
      document.getElementById('lb-next').disabled = lbIdx === items.length - 1;
      const fprev = document.getElementById('lb-float-prev');
      const fnext = document.getElementById('lb-float-next');
      if (fprev) { fprev.disabled = lbIdx === 0; fprev.style.display = isShare ? 'none' : ''; }
      if (fnext) { fnext.disabled = lbIdx === items.length - 1; fnext.style.display = isShare ? 'none' : ''; }
    }

    /* ── MEDIA TYPE DETECTION ── */
    function isVideoUrl(url) {
      if (!url) return false;
      return /youtube\.com|youtu\.be|vimeo\.com|wistia|bunnycdn\.com|mediadelivery\.net|cloudflarestream\.com/i.test(url);
    }
    function isImageUrl(url) {
      if (!url) return false;
      return /\.(jpg|jpeg|png|gif|webp|avif|svg)(\?|#|$)/i.test(url);
    }

    /* ── GALLERY VIEWER ── */
    function openGallery(catId, idx) {
      gvCat  = catId;
      gvIdx  = idx;
      gvItems = previewGetItems(catId);
      renderGallery();
      document.getElementById('gallery-viewer').classList.add('open');
      document.body.classList.add('gv-open');
      lockScroll();
    }

    function closeGallery() {
      if (!document.getElementById('gallery-viewer').classList.contains('open')) return;
      document.getElementById('gallery-viewer').classList.remove('open');
      document.body.classList.remove('gv-open');
      unlockScroll();
      // Stop video if playing
      const iframe = document.getElementById('gv-iframe');
      iframe.src = '';
      iframe.style.display = 'none';
      document.getElementById('gv-img').src = '';
      gvItems = [];
    }

    function galleryNav(dir) {
      const newIdx = Math.max(0, Math.min(gvItems.length - 1, gvIdx + dir));
      if (newIdx === gvIdx) return; // at boundary
      const curtain = document.getElementById('gv-curtain');

      function revealCurtain() {
        curtain.style.transition = 'opacity 0.22s ease';
        curtain.style.opacity = '0';
      }

      curtain.style.transition = 'opacity 0.15s ease';
      curtain.style.opacity = '1';

      setTimeout(() => {
        gvIdx = newIdx;
        renderGallery();
        const img = document.getElementById('gv-img');
        // If it's a video (img hidden) or the image is already loaded/cached, reveal immediately
        if (img.style.display === 'none' || img.complete) {
          revealCurtain();
        } else {
          // Wait for the new image to actually paint before lifting the curtain
          let revealed = false;
          const done = () => {
            if (revealed) return;
            revealed = true;
            img.removeEventListener('load',  done);
            img.removeEventListener('error', done);
            revealCurtain();
          };
          img.addEventListener('load',  done);
          img.addEventListener('error', done);
          // Fallback — never hold the curtain longer than 700ms
          setTimeout(done, 700);
        }
      }, 150);
    }

    function renderGallery() {
      const p = gvItems[gvIdx];
      if (!p) return;
      const img    = document.getElementById('gv-img');
      const iframe = document.getElementById('gv-iframe');

      if (isVideoUrl(p.url)) {
        img.style.display    = 'none';
        iframe.style.display = 'block';
        iframe.src = getEmbedUrl(p.url);
      } else {
        iframe.style.display = 'none';
        iframe.src = '';
        img.style.display = 'block';
        img.src = p.url || p.thumbnail || '';
        img.alt = x(p.title || '');
      }

      // Nav sidebar info (desktop nav-left)
      document.getElementById('gv-nav-client').textContent  = p.client || '';
      document.getElementById('gv-nav-title').textContent   = p.title  || '';
      document.getElementById('gv-nav-counter').textContent  = `${gvIdx + 1} / ${gvItems.length}`;
      // Mobile portrait info under the image
      document.getElementById('gv-info-client').textContent = p.client || '';
      document.getElementById('gv-info-title').textContent  = p.title  || '';
      document.getElementById('gv-ctrl-counter').textContent = `${gvIdx + 1} / ${gvItems.length}`;
      const atStart = gvIdx === 0;
      const atEnd   = gvIdx === gvItems.length - 1;
      document.getElementById('gv-prev').disabled      = atStart;
      document.getElementById('gv-next').disabled      = atEnd;
      document.getElementById('gv-ctrl-prev').disabled = atStart;
      document.getElementById('gv-ctrl-next').disabled = atEnd;
    }

    /* ── EMBED URL ── */
    function getEmbedUrl(url) {
      if (!url) return '';
      // YouTube
      const yt = url.match(/(?:youtube\.com\/(?:[^/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?/\s]{11})/);
      if (yt) {
        const t = url.match(/[?&#]t=(\d+)/);
        return `https://www.youtube.com/embed/${yt[1]}?autoplay=1&rel=0&modestbranding=1${t ? '&start=' + t[1] : ''}`;
      }
      // Vimeo
      const vi = url.match(/vimeo\.com\/(\d+)(?:\/([a-f0-9]+))?/);
      if (vi) {
        const t = url.match(/#t=(\d+)s?/);
        return `https://player.vimeo.com/video/${vi[1]}?autoplay=1&title=0&byline=0&portrait=0&background_color=000000${vi[2] ? '&h=' + vi[2] : ''}${t ? '#t=' + t[1] + 's' : ''}`;
      }
      // Wistia
      const wi = url.match(/(?:wistia\.(?:com|net)\/(?:medias|embed\/iframe)\/)([a-zA-Z0-9]+)/);
      if (wi) return `https://fast.wistia.net/embed/iframe/${wi[1]}?autoPlay=true&fitStrategy=fill&playerColor=131110`;
      // Bunny.net — watch URL: video.bunnycdn.com/play/LIBRARY/VIDEO_ID
      //                     or player.mediadelivery.net/play/LIBRARY/VIDEO_ID
      const bunny = url.match(/(?:video\.bunnycdn\.com|player\.mediadelivery\.net)\/play\/(\d+)\/([a-zA-Z0-9-]+)/);
      if (bunny) return `https://iframe.mediadelivery.net/embed/${bunny[1]}/${bunny[2]}?autoplay=true&preload=true`;
      // Bunny.net — already an embed URL (iframe.mediadelivery.net)
      if (/iframe\.mediadelivery\.net\/embed/i.test(url)) {
        return url.includes('autoplay') ? url : url + (url.includes('?') ? '&' : '?') + 'autoplay=true';
      }
      // Cloudflare Stream — customer subdomain: customer-xxx.cloudflarestream.com/ID/watch
      const cfCustomer = url.match(/(https?:\/\/[a-z0-9-]+\.cloudflarestream\.com\/[a-zA-Z0-9]+)\/(watch|iframe)/);
      if (cfCustomer) return cfCustomer[1] + '/iframe';
      // Cloudflare Stream — watch.cloudflarestream.com/ID
      const cfWatch = url.match(/watch\.cloudflarestream\.com\/([a-zA-Z0-9]+)/);
      if (cfWatch) return `https://iframe.cloudflarestream.com/${cfWatch[1]}`;
      // Cloudflare Stream — already an embed URL or bare cloudflarestream.com/ID/watch
      const cfBare = url.match(/cloudflarestream\.com\/([a-zA-Z0-9]+)/);
      if (cfBare) return `https://iframe.cloudflarestream.com/${cfBare[1]}`;
      return url;
    }

    /* ── SPLASH ── */
    function maybeShowSplash() {
      const sp = siteConfig.splash;
      if (!sp?.enabled) return;
      if (sp.skipReturning && sessionStorage.getItem(SPLASH_SEEN_KEY)) return;
      sessionStorage.setItem(SPLASH_SEEN_KEY, '1');
      const el = document.getElementById('splash');
      el.classList.remove('gone');
      // Video bg
      if (sp.video) {
        const bg = document.getElementById('splash-video-bg');
        const embed = getEmbedUrl(sp.video);
        if (embed !== sp.video) {
          // is youtube/vimeo — use iframe with muted background flags
          const viFrame = sp.video.match(/vimeo/) ? `${embed}&background=1&muted=1&loop=1` : `${embed}&mute=1&loop=1&playlist=${embed.split('/').pop()?.split('?')[0]}`;
          bg.innerHTML = `<iframe src="${x(viFrame)}" frameborder="0" allow="autoplay"></iframe>`;
        } else {
          bg.innerHTML = `<video src="${x(sp.video)}" autoplay muted loop playsinline></video>`;
        }
      }
      const dur = ((sp.duration || 5) * 1000);
      setTimeout(dismissSplash, dur);
    }

    function dismissSplash() {
      const el = document.getElementById('splash');
      el.classList.add('fading');
      setTimeout(() => el.classList.add('gone'), 650);
    }

    /* ── NAV DRAWER ── */
    function toggleDrawer() { document.getElementById('nav-drawer').classList.toggle('open'); }
    function closeDrawer()  { document.getElementById('nav-drawer').classList.remove('open'); }

    // Close drawer instantly (no animation) to prevent size-jump glitches on rotation
    function closeDrawerInstant() {
      const d = document.getElementById('nav-drawer');
      d.style.transition = 'none';
      d.classList.remove('open');
      requestAnimationFrame(() => requestAnimationFrame(() => { d.style.transition = ''; }));
    }
    window.addEventListener('orientationchange', closeDrawerInstant);
    window.addEventListener('resize', closeDrawerInstant);

    // Pinch-zoom lock — only active when siteConfig.zoomLock is true
    if (siteConfig.zoomLock) {
      document.addEventListener('gesturestart',  function(e) { e.preventDefault(); }, { passive: false, capture: true });
      document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { passive: false, capture: true });
      document.addEventListener('touchmove', function(e) {
        if (e.touches.length > 1) e.preventDefault();
      }, { passive: false, capture: true });
    }

    // Close drawer when tapping or scrolling outside the nav bar
    document.addEventListener('click', function(e) {
      const drawer = document.getElementById('nav-drawer');
      if (drawer && drawer.classList.contains('open') && !e.target.closest('nav')) {
        closeDrawer();
      }
    });
    document.addEventListener('scroll', function() {
      closeDrawer();
    }, { passive: true });

    /* ── TOUCH SWIPE — gallery viewer ──
       Horizontal swipe → galleryNav(prev/next).
       Downward drag → image follows finger, fades out as it goes;
                       past threshold release → closeGallery();
                       short release → snaps back into place.
       _gvTouchX/Y are set to null whenever a second finger lands, so
       pinch-zoom never triggers nav, drag, or close. */
    (function() {
      const gvMedia = document.getElementById('gv-media');
      let startX = null, startY = null, dir = null, dragging = false;

      function resetTransform(animate) {
        gvMedia.style.transition = animate ? 'transform 0.2s ease-out, opacity 0.2s ease-out' : 'none';
        gvMedia.style.transform = '';
        gvMedia.style.opacity = '';
      }

      gvMedia.addEventListener('touchstart', e => {
        if (e.touches.length > 1) { startX = startY = null; dragging = false; return; }
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        dir = null;
        dragging = true;
        resetTransform(false);
      }, { passive: true });

      gvMedia.addEventListener('touchmove', e => {
        if (e.touches.length > 1) { startX = startY = null; dragging = false; return; }
        if (!dragging || startY === null) return;
        const dx = e.touches[0].clientX - startX;
        const dy = e.touches[0].clientY - startY;
        // Lock direction once movement passes 10px
        if (dir === null && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
          dir = Math.abs(dy) > Math.abs(dx) ? 'v' : 'h';
        }
        // Drag image with finger only on downward vertical
        if (dir === 'v' && dy > 0) {
          gvMedia.style.transition = 'none';
          gvMedia.style.transform = `translateY(${dy}px)`;
          gvMedia.style.opacity = String(Math.max(0.35, 1 - dy / 500));
        }
      }, { passive: true });

      gvMedia.addEventListener('touchend', e => {
        if (!dragging) { startX = startY = null; return; }
        dragging = false;
        if (startY === null) return;
        const dx = e.changedTouches[0].clientX - startX;
        const dy = e.changedTouches[0].clientY - startY;
        startX = startY = null;
        // Past threshold → animate out and close
        if (dir === 'v' && dy > 100) {
          gvMedia.style.transition = 'transform 0.22s ease-out, opacity 0.22s ease-out';
          gvMedia.style.transform = `translateY(${window.innerHeight}px)`;
          gvMedia.style.opacity = '0';
          setTimeout(() => { closeGallery(); resetTransform(false); }, 220);
          return;
        }
        // Vertical drag that didn't reach threshold → snap back
        if (dir === 'v' && dy > 0) {
          resetTransform(true);
          return;
        }
        // Horizontal swipe past 40px → navigate
        if (Math.abs(dx) >= 40) galleryNav(dx < 0 ? 1 : -1);
      }, { passive: true });
    })();

    /* ── PREVENT iOS RUBBER-BAND OVERSCROLL ──
       iOS Safari ignores overscroll-behavior on html/body for the page-level
       scroll. This handler intercepts touchmove at page boundaries and
       preventDefault()s so the page doesn't bounce — eliminating the visible
       gap above the nav after a pull-down. Inner scrollables (gallery,
       lightbox, drawer, form fields) are excluded so they keep their native
       scroll behavior. */
    (function() {
      let touchStartY = 0;
      document.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
      }, { passive: true });

      document.addEventListener('touchmove', (e) => {
        // Allow inner scrollable contexts to behave normally — main is the
        // scroll container on mobile portrait (Path B), so it must be excluded
        // or rubber-band-prevention would block legitimate scrolling.
        if (e.target.closest('main, .gv, .lightbox, .nav-drawer, textarea, input')) return;

        const touchY = e.touches[0].clientY;
        const scrollTop = window.scrollY || document.documentElement.scrollTop || 0;
        const scrollHeight = document.documentElement.scrollHeight;
        const clientHeight = document.documentElement.clientHeight;

        const atTop = scrollTop <= 0;
        const atBottom = scrollTop + clientHeight >= scrollHeight - 1;
        const pullingDown = touchY > touchStartY;
        const pullingUp = touchY < touchStartY;

        if ((atTop && pullingDown) || (atBottom && pullingUp)) {
          e.preventDefault();
        }
      }, { passive: false });
    })();

    /* ── KEYBOARD ── */
    document.addEventListener('keydown', e => {
      if (document.getElementById('gallery-viewer').classList.contains('open')) {
        if (e.key === 'ArrowRight') galleryNav(1);
        if (e.key === 'ArrowLeft')  galleryNav(-1);
        if (e.key === 'Escape')     closeGallery();
        return;
      }
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'ArrowRight') lbNav(1);
      if (e.key === 'ArrowLeft')  lbNav(-1);
      if (e.key === 'Escape')     closeLb();
    });

    init();
  </script>
</body>
</html>
